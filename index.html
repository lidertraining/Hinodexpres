<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />

<!-- 📱 PWA: Meta tags pra app fullscreen iOS + Android -->
<meta name="theme-color" content="#370014" />
<meta name="background-color" content="#1F0009" />
<meta name="color-scheme" content="dark" />

<!-- iOS: tudo pra abrir como app sem barra de Safari -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Hinode" />
<meta name="format-detection" content="telephone=no" />

<!-- Android Chrome -->
<meta name="mobile-web-app-capable" content="yes" />
<meta name="application-name" content="Hinode Express" />

<!-- Manifest e ícones -->
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />
<link rel="shortcut icon" href="apple-touch-icon.png" />

<!-- SEO básico -->
<meta name="description" content="Perfumes e cosméticos Hinode entregues em até 60 minutos no conforto da sua casa." />
<meta property="og:title" content="Hinode Express" />
<meta property="og:description" content="Beleza Hinode em casa em até 60 minutos. Pedido pelo app, entrega expressa via Uber." />
<meta property="og:type" content="website" />
<meta property="og:image" content="icon-512.png" />
<title>Hinode Express — Protótipo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=JetBrains+Mono:wght@400;500;600;700&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  /* Paleta oficial Hinode */
  --rouge: #B90032;
  --rouge-soft: #D4234D;
  --bordeaux: #370014;
  --bordeaux-deep: #1F0009;
  --noir: #00002D;
  --noir-soft: #0A1438;
  --or: #AA8232;
  --or-light: #D4AF60;
  --or-shimmer: #F4DCA0;
  --rose: #FFE0D8;
  --rose-deep: #F5C5BA;
  --creme: #E1DCD5;
  --creme-light: #F4F0EA;
  --blanc: #FBF8F4;
  --noir-pure: #0A0A0A;
  --gray-warm: #6B6258;
  --gray-mute: #B8B0A6;
  --success: #2E7D5B;
  --warn: #C97B1F;

  --shadow-soft: 0 4px 20px rgba(55, 0, 20, 0.08);
  --shadow-card: 0 8px 32px rgba(55, 0, 20, 0.12);
  --shadow-deep: 0 24px 60px rgba(55, 0, 20, 0.25);
  --shadow-gold: 0 8px 28px rgba(170, 130, 50, 0.35);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body { height: 100%; }

body {
  font-family: 'Manrope', sans-serif;
  background: var(--bordeaux-deep);
  color: var(--blanc);
  min-height: 100vh; /* fallback */
  min-height: 100dvh; /* dynamic viewport — não pula com barra do navegador */
  min-height: 100svh; /* fallback alternativo */
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* Em desktop o body recebe o gradiente decorativo, no mobile fica liso */
@media (min-width: 700px) {
  body {
    background:
      radial-gradient(circle at 20% 10%, rgba(170, 130, 50, 0.08), transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(185, 0, 50, 0.06), transparent 50%),
      linear-gradient(135deg, var(--bordeaux-deep) 0%, var(--noir) 50%, var(--bordeaux) 100%);
  }
}

.serif { font-family: 'Cormorant Garamond', serif; }
.italic { font-style: italic; }

/* ================ ESTRUTURA GERAL ================ */
#app {
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  position: relative;
}

/* Top-bar: visível em desktop pra alternar Cliente/Franquia.
   No mobile fica MUITO discreta — só um botão flutuante pra trocar de visão. */
.top-bar {
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 22px;
  background: rgba(10, 10, 10, 0.6);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(170, 130, 50, 0.15);
}

/* No mobile: top-bar fica só no canto, flutuando sobre o app */
@media (max-width: 699px) {
  .top-bar {
    position: fixed;
    top: env(safe-area-inset-top, 0);
    right: 0;
    left: auto;
    background: transparent;
    border: none;
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
    padding: 8px 12px;
    pointer-events: none;
    z-index: 999;
  }
  .top-bar > div:first-child { display: none; } /* esconde brand HINODE */
  .top-bar > div:last-child { pointer-events: auto; }
  .franchise-link {
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    color: var(--or-light);
    border-color: rgba(212, 175, 96, 0.4);
    padding: 6px 10px;
    font-size: 10px;
  }
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: 'Cormorant Garamond', serif;
  font-weight: 600;
  font-size: 22px;
  letter-spacing: 1.5px;
}

.brand-mark {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--or-light), var(--or));
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cormorant Garamond', serif;
  font-weight: 700;
  color: var(--bordeaux);
  font-size: 18px;
  font-style: italic;
}

.brand-tag {
  font-size: 9px;
  letter-spacing: 4px;
  color: var(--or-light);
  text-transform: uppercase;
  margin-top: -2px;
  font-family: 'Manrope', sans-serif;
  font-weight: 500;
}

.view-switcher {
  display: flex;
  gap: 4px;
  padding: 4px;
  background: rgba(255, 255, 255, 0.06);
  border-radius: 999px;
  border: 1px solid rgba(170, 130, 50, 0.25);
}

.view-btn {
  border: none;
  background: transparent;
  color: var(--creme);
  padding: 6px 14px;
  font-family: 'Manrope', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  border-radius: 999px;
  cursor: pointer;
  transition: all 0.3s;
}

.view-btn.active {
  background: linear-gradient(135deg, var(--or-light), var(--or));
  color: var(--bordeaux);
  box-shadow: var(--shadow-gold);
}

/* Botão discreto "Sou franqueado" no top-bar */
.franchise-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(170, 130, 50, 0.25);
  color: var(--creme);
  padding: 8px 14px;
  border-radius: 999px;
  font-family: 'Manrope', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: all 0.3s;
}

.franchise-link:hover {
  background: rgba(170, 130, 50, 0.15);
  border-color: var(--or-light);
  color: var(--or-light);
}

@media (max-width: 600px) {
  .franchise-link span:last-child { display: none; }
}

.stage {
  flex: 1;
  display: flex;
  align-items: stretch;
  justify-content: center;
  padding: 0;
  position: relative;
}

/* Em desktop, dá um respiro lateral pro app não ficar encostado */
@media (min-width: 700px) {
  .stage {
    padding: 30px 20px;
    align-items: center;
  }
}

/* Decorativo de fundo (só desktop, no mobile o app ocupa tudo) */
.stage::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(circle at 1px 1px, rgba(212, 175, 96, 0.08) 1px, transparent 0);
  background-size: 28px 28px;
  pointer-events: none;
  opacity: 0.6;
  display: none;
}

@media (min-width: 700px) {
  .stage::before { display: block; }
}

/* ================ HUB (TELA INICIAL) ================ */
.hub {
  width: 100%;
  max-width: 1100px;
  text-align: center;
  animation: fadeUp 0.8s ease-out;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

.hub-eyebrow {
  font-size: 10px;
  letter-spacing: 8px;
  color: var(--or-light);
  text-transform: uppercase;
  margin-bottom: 18px;
  font-weight: 500;
}

.hub-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(48px, 9vw, 96px);
  font-weight: 500;
  line-height: 0.95;
  margin-bottom: 14px;
}

.hub-title em {
  font-style: italic;
  background: linear-gradient(135deg, var(--or-shimmer), var(--or));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

.hub-sub {
  font-size: 16px;
  color: var(--creme);
  opacity: 0.75;
  margin-bottom: 60px;
  max-width: 560px;
  margin-left: auto; margin-right: auto;
  line-height: 1.6;
}

.hub-cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 24px;
  margin-bottom: 40px;
}

.role-card {
  position: relative;
  padding: 36px 28px;
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(170, 130, 50, 0.2);
  border-radius: 24px;
  cursor: pointer;
  text-align: left;
  overflow: hidden;
  transition: all 0.4s cubic-bezier(0.2, 0.9, 0.3, 1);
  backdrop-filter: blur(10px);
}

.role-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(170, 130, 50, 0.12), transparent 60%);
  opacity: 0;
  transition: opacity 0.4s;
}

.role-card:hover {
  transform: translateY(-6px);
  border-color: var(--or-light);
  box-shadow: var(--shadow-deep);
}

.role-card:hover::before { opacity: 1; }

.role-icon {
  width: 56px; height: 56px;
  border-radius: 16px;
  background: linear-gradient(135deg, var(--rouge), var(--bordeaux));
  display: flex; align-items: center; justify-content: center;
  font-size: 26px;
  margin-bottom: 24px;
  border: 1px solid rgba(212, 175, 96, 0.4);
}

.role-card h3 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px;
  font-weight: 600;
  margin-bottom: 8px;
}

.role-card p {
  font-size: 13px;
  color: var(--creme);
  opacity: 0.7;
  line-height: 1.6;
  margin-bottom: 18px;
}

.role-card .arrow {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--or-light);
  text-transform: uppercase;
  font-weight: 600;
}

.hub-foot {
  font-size: 11px;
  letter-spacing: 3px;
  color: var(--creme);
  opacity: 0.4;
  text-transform: uppercase;
}

/* ================ APP FULLSCREEN (webapp puro, sem moldura de celular) ================ */
.phone-frame {
  width: 100%;
  height: 100dvh;
  max-height: 100dvh;
  background: var(--blanc);
  border-radius: 0;
  padding: 0;
  box-shadow: none;
  position: relative;
  z-index: 1;
  overflow: hidden;
  /* No desktop, limita a largura para parecer um app vertical */
  max-width: 100%;
}

@media (min-width: 700px) {
  .phone-frame {
    max-width: 480px;
    height: calc(100dvh - 80px);
    max-height: calc(100dvh - 80px);
    border-radius: 32px;
    box-shadow:
      0 0 0 1px rgba(170, 130, 50, 0.18),
      0 30px 80px rgba(0, 0, 0, 0.5);
    margin: 0 auto;
  }
}

.phone-screen {
  width: 100%;
  height: 100%;
  border-radius: inherit;
  background: var(--blanc);
  color: var(--noir-pure);
  overflow: hidden;
  position: relative;
  display: flex;
  flex-direction: column;
}

.phone-notch {
  display: none; /* sem notch fake — usamos a barra real do celular do usuário */
}

/* Status bar fake escondida — o celular do usuário já mostra a real */
.status-bar {
  display: none;
}

/* Conteúdo do app rolável */
.app-content {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 100px;
}

.app-content::-webkit-scrollbar { width: 0; }

.bottom-nav {
  position: absolute;
  bottom: max(12px, env(safe-area-inset-bottom, 12px));
  left: 12px; right: 12px;
  background: rgba(10, 10, 10, 0.95);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border-radius: 28px;
  padding: 12px 6px;
  display: flex;
  justify-content: space-around;
  align-items: center;
  box-shadow: 0 12px 30px rgba(0,0,0,0.3);
  z-index: 8;
}

.nav-item {
  background: none;
  border: none;
  color: var(--creme);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.5px;
  cursor: pointer;
  padding: 6px 14px;
  border-radius: 16px;
  transition: all 0.3s;
  opacity: 0.65;
}

.nav-item.active {
  opacity: 1;
  color: var(--or-light);
}

.nav-item.active .nav-ico {
  background: linear-gradient(135deg, var(--or-light), var(--or));
  color: var(--bordeaux);
}

.nav-ico {
  width: 28px; height: 28px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  transition: all 0.3s;
}

/* ================ APP CLIENTE ================ */

/* ========== Onboarding V2 (CEP-first, paralelo) ========== */
.onboarding-v2 {
  height: 100%;
  display: flex;
  flex-direction: column;
  background: linear-gradient(180deg, var(--bordeaux-deep) 0%, var(--bordeaux) 50%, #FBF8F4 50%, #FBF8F4 100%);
  position: relative;
  overflow-y: auto;
}

.onb2-hero {
  text-align: center;
  padding: 60px 28px 28px;
  color: var(--blanc);
  position: relative;
}

.onb2-mark {
  width: 56px; height: 56px;
  margin: 0 auto 14px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--or-light), var(--or));
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 700;
  font-size: 28px;
  color: var(--bordeaux);
  box-shadow: var(--shadow-gold);
}

.onb2-eyebrow {
  font-size: 9px;
  letter-spacing: 6px;
  color: var(--or-light);
  text-transform: uppercase;
  font-weight: 600;
  margin-bottom: 8px;
}

.onb2-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 32px;
  font-weight: 500;
  line-height: 1.05;
  margin-bottom: 6px;
}

.onb2-title em {
  font-style: italic;
  color: var(--or-light);
}

.onb2-sub {
  font-size: 13px;
  opacity: 0.8;
  line-height: 1.5;
  max-width: 280px;
  margin: 0 auto;
}

.onb2-card {
  flex: 1;
  background: var(--blanc);
  margin: 0 16px 16px;
  border-radius: 24px;
  padding: 22px 22px 24px;
  box-shadow: 0 -10px 30px rgba(0,0,0,0.1);
  position: relative;
  z-index: 2;
}

/* ===== Pipeline visual (3 passos rodando em paralelo) ===== */
.onb2-pipeline {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 16px 8px;
  margin-bottom: 22px;
  background: linear-gradient(135deg, var(--creme-light), #fff);
  border-radius: 16px;
  border: 1px solid var(--creme);
}

.onb2-step {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  flex: 0 0 auto;
  transition: all 0.3s;
}

.onb2-step-ico {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: var(--creme);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  color: var(--gray-warm);
  border: 2px solid var(--creme);
  transition: all 0.4s;
}

.onb2-step.idle .onb2-step-ico {
  opacity: 0.5;
}

.onb2-step.loading .onb2-step-ico {
  background: linear-gradient(135deg, var(--rouge), var(--bordeaux));
  border-color: var(--rouge);
  color: white;
  animation: pulseLoad 1.5s ease-in-out infinite;
}

.onb2-step.done .onb2-step-ico {
  background: linear-gradient(135deg, var(--success), #4CAF80);
  border-color: var(--success);
  color: white;
  animation: stepPop 0.4s ease-out;
  box-shadow: 0 4px 12px rgba(46, 125, 91, 0.3);
}

@keyframes pulseLoad {
  0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(185, 0, 50, 0.4); }
  50% { transform: scale(1.05); box-shadow: 0 0 0 8px rgba(185, 0, 50, 0); }
}

@keyframes stepPop {
  0% { transform: scale(0.6); }
  60% { transform: scale(1.15); }
  100% { transform: scale(1); }
}

.onb2-step-label {
  font-size: 10px;
  letter-spacing: 0.5px;
  color: var(--noir-pure);
  font-weight: 600;
  text-transform: uppercase;
}

.onb2-step.idle .onb2-step-label {
  color: var(--gray-mute);
}

.onb2-step-line {
  flex: 1;
  height: 2px;
  background: linear-gradient(90deg, var(--creme), var(--gray-mute), var(--creme));
  margin-bottom: 14px;
  max-width: 36px;
}

/* ===== Form fields ===== */
.onb2-field-group {
  margin-bottom: 14px;
}

.onb2-row {
  display: flex;
  gap: 10px;
  margin-bottom: 14px;
}

.onb2-row .onb2-field-group {
  margin-bottom: 0;
}

.onb2-label {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 11px;
  font-weight: 700;
  color: var(--noir-pure);
  letter-spacing: 0.5px;
  margin-bottom: 6px;
  text-transform: uppercase;
}

.onb2-help {
  font-size: 10px;
  color: var(--rouge);
  font-weight: 600;
  text-transform: none;
  letter-spacing: 0;
  cursor: pointer;
}

.onb2-input-wrap {
  position: relative;
}

.onb2-input {
  width: 100%;
  padding: 14px 16px;
  border: 1.5px solid var(--creme);
  border-radius: 14px;
  font-family: 'Manrope', sans-serif;
  font-size: 14px;
  background: var(--blanc);
  color: var(--noir-pure);
  outline: none;
  transition: all 0.2s;
}

.onb2-cep {
  font-family: 'JetBrains Mono', 'Manrope', monospace;
  letter-spacing: 1px;
  font-size: 16px;
  font-weight: 600;
  padding-right: 50px;
}

.onb2-input:focus {
  border-color: var(--rouge);
  box-shadow: 0 0 0 4px rgba(185, 0, 50, 0.08);
}

.onb2-input-status {
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}

.onb2-spinner {
  width: 18px; height: 18px;
  border: 2.5px solid var(--creme);
  border-top-color: var(--rouge);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

.onb2-spinner-sm {
  width: 14px; height: 14px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.onb2-readonly {
  background: linear-gradient(135deg, var(--rose), #FFF5F0);
  border: 1.5px solid var(--rose-deep);
  border-radius: 14px;
  padding: 12px 16px;
}

.onb2-readonly-line {
  font-size: 14px;
  font-weight: 600;
  color: var(--bordeaux);
  margin-bottom: 2px;
}

.onb2-readonly-sub {
  font-size: 12px;
  color: var(--gray-warm);
}

.onb2-cta {
  width: 100%;
  background: linear-gradient(135deg, var(--bordeaux), var(--rouge));
  color: var(--blanc);
  border: none;
  padding: 16px 18px;
  border-radius: 16px;
  font-family: 'Manrope', sans-serif;
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 0.5px;
  cursor: pointer;
  margin-top: 8px;
  margin-bottom: 14px;
  box-shadow: 0 8px 22px rgba(185, 0, 50, 0.35);
  transition: all 0.3s;
}

.onb2-cta:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 12px 28px rgba(185, 0, 50, 0.45);
}

.onb2-cta:disabled {
  background: linear-gradient(135deg, #999, #aaa);
  cursor: not-allowed;
  box-shadow: none;
  opacity: 0.65;
}

.onb2-trust {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  color: var(--gray-warm);
  text-align: center;
  justify-content: center;
  margin-top: 8px;
  padding-top: 12px;
  border-top: 1px dashed var(--creme);
}

/* Banner "Fora de cobertura" */
.onb2-out-coverage {
  display: flex;
  gap: 14px;
  padding: 16px;
  background: linear-gradient(135deg, #FFF5F0, #FFE0D8);
  border: 1px solid var(--rose-deep);
  border-radius: 16px;
  margin-bottom: 14px;
  align-items: flex-start;
}

.onb2-oc-icon {
  font-size: 32px;
  line-height: 1;
  flex-shrink: 0;
  animation: floatSun 3s ease-in-out infinite;
}

@keyframes floatSun {
  0%, 100% { transform: translateY(0) rotate(-3deg); }
  50% { transform: translateY(-4px) rotate(3deg); }
}

.onb2-oc-content {
  flex: 1;
}

.onb2-oc-content b {
  display: block;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 18px;
  font-weight: 600;
  color: var(--bordeaux);
  margin-bottom: 4px;
}

.onb2-oc-content p {
  font-size: 12px;
  color: var(--gray-warm);
  line-height: 1.5;
  margin: 0 0 4px;
}

.onb2-oc-content p b {
  display: inline;
  font-family: 'Manrope', sans-serif;
  font-style: normal;
  font-size: 12px;
  color: var(--bordeaux);
}

.onb2-oc-content small {
  font-size: 10px;
  color: var(--gray-warm);
  letter-spacing: 0.3px;
  display: block;
  margin-top: 2px;
}

@keyframes fadeInDown {
  from { opacity: 0; transform: translateY(-8px); }
  to { opacity: 1; transform: translateY(0); }
}

.fadeInDown {
  animation: fadeInDown 0.4s cubic-bezier(0.2, 0.9, 0.3, 1) both;
}

/* ========== Stock badge nos produtos ========== */
.stock-badge {
  position: absolute;
  bottom: 8px; left: 8px;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.5px;
  padding: 3px 7px;
  border-radius: 999px;
  color: white;
  z-index: 2;
}

.stock-badge.high { background: rgba(46, 125, 91, 0.85); backdrop-filter: blur(4px); }
.stock-badge.low { background: rgba(201, 123, 31, 0.92); }
.stock-badge.out { background: rgba(110, 110, 110, 0.92); }

.product-card.out-of-stock {
  opacity: 0.5;
  pointer-events: none;
}

.product-card.out-of-stock .product-img::after {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0.4);
  backdrop-filter: grayscale(0.6);
}

/* ========== Header franquia ativa (no home) ========== */
.franchise-bar {
  background: rgba(0, 0, 0, 0.3);
  border: 1px solid rgba(212, 175, 96, 0.3);
  border-radius: 14px;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  margin-top: 14px;
  cursor: pointer;
  position: relative;
  z-index: 2;
}

.franchise-bar-icon {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--or-light), var(--or));
  color: var(--bordeaux);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cormorant Garamond', serif;
  font-weight: 700;
  font-size: 16px;
  flex-shrink: 0;
}

.franchise-bar-info {
  flex: 1;
  font-size: 11px;
  line-height: 1.3;
}

.franchise-bar-info b {
  font-size: 12px;
  font-weight: 700;
  color: var(--blanc);
}

.franchise-bar-info small {
  display: block;
  opacity: 0.75;
  margin-top: 1px;
}

.franchise-bar-arrow {
  color: var(--or-light);
  font-size: 14px;
  font-weight: 600;
}

/* ========== Selo Hinode no checkout ========== */
.hinode-seal {
  background: linear-gradient(135deg, #0d0d12, #1a1a24);
  color: #d4d4dc;
  border-radius: 14px;
  padding: 12px 14px;
  margin: 14px 20px 0;
  display: flex;
  align-items: center;
  gap: 12px;
  border: 1px solid rgba(212, 175, 96, 0.25);
}

.hinode-seal-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--or-light), var(--or));
  color: var(--bordeaux);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 700;
  font-size: 18px;
  flex-shrink: 0;
}

.hinode-seal-text {
  flex: 1;
  font-size: 11px;
  line-height: 1.4;
}

.hinode-seal-text b {
  display: block;
  font-size: 12px;
  color: var(--or-light);
  margin-bottom: 2px;
  letter-spacing: 0.5px;
}

.hinode-seal-text small {
  display: block;
  opacity: 0.7;
  font-size: 10px;
}

.hinode-seal-lock {
  font-size: 14px;
  color: #4CAF80;
}

/* ========== Pix QR Code mock ========== */
.pix-qr-card {
  background: var(--blanc);
  border: 2px solid var(--rouge);
  border-radius: 18px;
  padding: 18px;
  margin-top: 12px;
  text-align: center;
  position: relative;
}

.pix-qr-mock {
  width: 160px;
  height: 160px;
  margin: 0 auto 12px;
  background:
    repeating-linear-gradient(0deg, var(--noir-pure) 0 4px, var(--blanc) 4px 8px),
    repeating-linear-gradient(90deg, var(--noir-pure) 0 4px, var(--blanc) 4px 8px);
  background-blend-mode: difference;
  border-radius: 6px;
  position: relative;
}

.pix-qr-mock::before, .pix-qr-mock::after {
  content: '';
  position: absolute;
  width: 38px; height: 38px;
  background: var(--blanc);
  border: 6px solid var(--noir-pure);
  border-radius: 4px;
}

.pix-qr-mock::before { top: 8px; left: 8px; }
.pix-qr-mock::after { top: 8px; right: 8px; }

.pix-qr-logo {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 32px; height: 32px;
  background: var(--rouge);
  color: white;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800;
  font-size: 13px;
}

.pix-qr-amount {
  font-family: 'Cormorant Garamond', serif;
  font-size: 26px;
  font-weight: 600;
  color: var(--bordeaux);
}

.pix-qr-time {
  font-size: 11px;
  color: var(--gray-warm);
  margin-bottom: 10px;
}

.pix-qr-copy {
  background: var(--creme-light);
  border-radius: 12px;
  padding: 10px 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--bordeaux);
  word-break: break-all;
  cursor: pointer;
  border: 1px dashed var(--gray-mute);
  margin-bottom: 8px;
}

.pix-status-banner {
  background: linear-gradient(135deg, #2E7D5B, #4CAF80);
  color: white;
  font-size: 12px;
  font-weight: 700;
  padding: 8px 12px;
  border-radius: 999px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  animation: pulse-soft 2s infinite;
}

.client-header {
  padding: 56px 24px 16px;
  background: linear-gradient(180deg, var(--bordeaux), var(--bordeaux-deep));
  color: var(--blanc);
  position: relative;
  overflow: hidden;
}

.client-header::after {
  content: '';
  position: absolute;
  top: -40px; right: -40px;
  width: 180px; height: 180px;
  background: radial-gradient(circle, rgba(212,175,96,0.25), transparent 60%);
  border-radius: 50%;
  pointer-events: none;
}

.greet-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: relative;
  z-index: 2;
}

.greet-name {
  font-size: 12px;
  opacity: 0.7;
  letter-spacing: 0.5px;
  margin-bottom: 2px;
}

.greet-title {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 22px;
  font-weight: 500;
}

.greet-title .accent {
  color: var(--or-light);
  font-weight: 600;
}

.icon-circle {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  display: flex; align-items: center; justify-content: center;
  border: 1px solid rgba(212,175,96,0.3);
  cursor: pointer;
  position: relative;
}

.icon-circle .badge {
  position: absolute;
  top: -2px; right: -2px;
  background: var(--or);
  color: var(--bordeaux);
  font-size: 9px;
  font-weight: 700;
  width: 16px; height: 16px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  border: 2px solid var(--bordeaux);
}

.search-row {
  display: flex;
  gap: 10px;
  margin-top: 18px;
  align-items: center;
  position: relative;
  z-index: 2;
}

.search-bar {
  flex: 1;
  background: rgba(255,255,255,0.95);
  color: var(--noir-pure);
  padding: 13px 18px;
  border-radius: 999px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  cursor: pointer;
}

.delivery-info {
  background: rgba(0,0,0,0.25);
  margin: 16px 24px 0;
  border-radius: 16px;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 12px;
  border: 1px solid rgba(212,175,96,0.2);
  position: relative;
  z-index: 2;
}

.delivery-info-text { flex: 1; line-height: 1.4; }
.delivery-info-text b { color: var(--or-light); }
.delivery-info-text small { display: block; opacity: 0.7; font-size: 11px; }

/* Hero promo */
.hero-promo {
  margin: 18px 0;
  padding: 0 24px;
}

.hero-card {
  position: relative;
  height: 160px;
  border-radius: 22px;
  background: linear-gradient(115deg, var(--bordeaux), var(--rouge));
  padding: 22px;
  overflow: hidden;
  color: var(--blanc);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  box-shadow: var(--shadow-card);
}

.hero-card::before {
  content: '✦';
  position: absolute;
  font-size: 220px;
  right: -40px; top: -100px;
  color: rgba(212,175,96, 0.18);
  pointer-events: none;
  font-family: 'Cormorant Garamond', serif;
}

.hero-card::after {
  content: '';
  position: absolute;
  bottom: -30px; right: -30px;
  width: 140px; height: 140px;
  background: radial-gradient(circle, rgba(255,224,216,0.25), transparent 70%);
  border-radius: 50%;
  pointer-events: none;
}

.hero-tag {
  font-size: 9px;
  letter-spacing: 4px;
  color: var(--or-light);
  text-transform: uppercase;
  font-weight: 600;
}

.hero-title {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 28px;
  font-weight: 500;
  line-height: 1;
  margin-top: 6px;
}

.hero-cta {
  align-self: flex-start;
  background: var(--blanc);
  color: var(--bordeaux);
  border: none;
  padding: 9px 18px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  border-radius: 999px;
  cursor: pointer;
}

/* Categorias */
.section { padding: 0 24px; margin-top: 24px; }

.section-head {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 14px;
}

.section-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 600;
  color: var(--noir-pure);
}

.section-link {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--rouge);
  cursor: pointer;
}

.cats-row {
  display: flex;
  gap: 12px;
  overflow-x: auto;
  padding-bottom: 8px;
  scrollbar-width: none;
}

.cats-row::-webkit-scrollbar { display: none; }

.cat-chip {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  cursor: pointer;
}

.cat-emoji {
  width: 64px; height: 64px;
  border-radius: 22px;
  background: linear-gradient(135deg, var(--creme-light), var(--blanc));
  display: flex; align-items: center; justify-content: center;
  font-size: 28px;
  border: 1px solid rgba(170, 130, 50, 0.15);
  transition: all 0.3s;
}

.cat-chip:hover .cat-emoji {
  background: linear-gradient(135deg, var(--rose), var(--rose-deep));
  transform: translateY(-2px);
  box-shadow: var(--shadow-soft);
}

.cat-chip span {
  font-size: 11px;
  font-weight: 600;
  color: var(--noir-pure);
}

/* Produtos cards */
.products-row {
  display: flex;
  gap: 14px;
  overflow-x: auto;
  padding-bottom: 8px;
  scrollbar-width: none;
}

.products-row::-webkit-scrollbar { display: none; }

.product-card {
  flex-shrink: 0;
  width: 160px;
  background: var(--blanc);
  border-radius: 18px;
  border: 1px solid var(--creme);
  overflow: hidden;
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
}

.product-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-card);
  border-color: var(--or-light);
}

.product-img {
  width: 100%;
  height: 160px;
  background: linear-gradient(135deg, var(--rose), var(--creme-light));
  display: flex; align-items: center; justify-content: center;
  font-size: 56px;
  position: relative;
  overflow: hidden;
}

.product-photo {
  width: 100%; height: 100%;
  object-fit: contain;
  padding: 14px;
  mix-blend-mode: multiply;
}
.detail-photo {
  max-width: 76%; max-height: 86%;
  object-fit: contain;
  mix-blend-mode: multiply;
}
.cart-item-photo {
  width: 100%; height: 100%;
  object-fit: contain;
  padding: 6px;
  border-radius: 14px;
  mix-blend-mode: multiply;
}

.product-img.bg-1 { background: linear-gradient(135deg, #FFE0D8, #F5C5BA); }
.product-img.bg-2 { background: linear-gradient(135deg, #E8D5E8, #D4B5D4); }
.product-img.bg-3 { background: linear-gradient(135deg, #FFE9C4, #F4DCA0); }
.product-img.bg-4 { background: linear-gradient(135deg, #D5E5DC, #B5D4C2); }
.product-img.bg-5 { background: linear-gradient(135deg, #E1DCD5, #C4BCB0); }
.product-img.bg-6 { background: linear-gradient(135deg, #F4CCC5, #D4234D); }

.product-tag {
  position: absolute;
  top: 8px; left: 8px;
  background: var(--bordeaux);
  color: var(--or-light);
  font-size: 8px;
  letter-spacing: 1.5px;
  font-weight: 700;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 999px;
}

.product-fav {
  position: absolute;
  top: 8px; right: 8px;
  width: 28px; height: 28px;
  background: rgba(255,255,255,0.9);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
  cursor: pointer;
  border: none;
}

.product-info { padding: 12px 14px; }
.product-cat {
  font-size: 9px;
  letter-spacing: 1.5px;
  color: var(--gray-warm);
  text-transform: uppercase;
  font-weight: 600;
}

.product-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 15px;
  font-weight: 600;
  margin: 4px 0 6px;
  line-height: 1.2;
  color: var(--noir-pure);
}

.product-price-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.product-price {
  font-size: 14px;
  font-weight: 700;
  color: var(--bordeaux);
}

.product-price small {
  font-size: 10px;
  font-weight: 500;
  color: var(--gray-warm);
}

.product-add {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: none;
  background: linear-gradient(135deg, var(--bordeaux), var(--rouge));
  color: var(--blanc);
  font-weight: 700;
  cursor: pointer;
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.3s;
}

.product-add:hover {
  background: linear-gradient(135deg, var(--or), var(--or-light));
  color: var(--bordeaux);
  transform: scale(1.1);
}

/* ================ TELA DE PRODUTO ================ */
.detail-screen {
  height: 100%;
  display: flex;
  flex-direction: column;
}

.detail-img {
  height: 360px;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 130px;
}

.detail-back {
  position: absolute;
  top: 56px; left: 16px;
  width: 40px; height: 40px;
  border-radius: 50%;
  background: rgba(255,255,255,0.9);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  border: none;
  font-size: 18px;
  z-index: 5;
  box-shadow: var(--shadow-soft);
}

.detail-fav-btn {
  position: absolute;
  top: 56px; right: 16px;
  width: 40px; height: 40px;
  border-radius: 50%;
  background: rgba(255,255,255,0.9);
  border: none;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 16px;
  box-shadow: var(--shadow-soft);
}

.detail-body {
  flex: 1;
  background: var(--blanc);
  border-radius: 32px 32px 0 0;
  margin-top: -28px;
  padding: 28px 24px 24px;
  position: relative;
  z-index: 2;
}

.detail-cat {
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--rouge);
  text-transform: uppercase;
  font-weight: 700;
}

.detail-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 32px;
  font-weight: 600;
  line-height: 1.05;
  margin: 8px 0 4px;
  color: var(--noir-pure);
}

.detail-name em {
  font-style: italic;
  font-weight: 400;
  color: var(--rouge);
}

.detail-rating {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  margin-bottom: 14px;
  color: var(--gray-warm);
}

.stars { color: var(--or); letter-spacing: 1px; }

.detail-desc {
  font-size: 13px;
  line-height: 1.7;
  color: var(--gray-warm);
  margin-bottom: 18px;
}

.detail-pillars {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 22px;
}

.pillar {
  text-align: center;
  padding: 10px 6px;
  background: var(--creme-light);
  border-radius: 14px;
}

.pillar-emoji { font-size: 18px; }
.pillar-label { font-size: 10px; font-weight: 700; margin-top: 4px; color: var(--noir-pure); }
.pillar-sub { font-size: 9px; color: var(--gray-warm); margin-top: 1px; }

.detail-cta-bar {
  position: absolute;
  bottom: 88px; left: 0; right: 0;
  background: var(--blanc);
  padding: 14px 24px 18px;
  display: flex;
  align-items: center;
  gap: 14px;
  box-shadow: 0 -8px 30px rgba(0,0,0,0.06);
  border-top: 1px solid var(--creme);
  z-index: 9;
}

.detail-price {
  flex: 1;
}

.detail-price-label {
  font-size: 10px;
  letter-spacing: 1px;
  color: var(--gray-warm);
  text-transform: uppercase;
}

.detail-price-val {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px;
  font-weight: 600;
  color: var(--bordeaux);
}

.detail-price-val small {
  font-size: 11px;
  font-weight: 500;
  color: var(--gray-warm);
  font-family: 'Manrope', sans-serif;
  display: block;
  margin-top: -2px;
}

.btn-primary {
  background: linear-gradient(135deg, var(--bordeaux), var(--rouge));
  color: var(--blanc);
  border: none;
  padding: 14px 22px;
  border-radius: 999px;
  font-family: 'Manrope', sans-serif;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 6px 20px rgba(185, 0, 50, 0.35);
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 28px rgba(185, 0, 50, 0.5);
}

.btn-gold {
  background: linear-gradient(135deg, var(--or-light), var(--or));
  color: var(--bordeaux);
  box-shadow: var(--shadow-gold);
}

.btn-outline {
  background: transparent;
  color: var(--bordeaux);
  border: 1.5px solid var(--bordeaux);
  box-shadow: none;
}

.btn-block { width: 100%; justify-content: center; }

/* ================ CART ================ */
.simple-header {
  padding: 56px 20px 16px;
  background: var(--blanc);
  border-bottom: 1px solid var(--creme);
  display: flex;
  align-items: center;
  gap: 14px;
}

.simple-header h2 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 26px;
  font-weight: 600;
  color: var(--noir-pure);
  flex: 1;
}

.icon-btn {
  width: 38px; height: 38px;
  border-radius: 12px;
  background: var(--creme-light);
  border: none;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 16px;
  color: var(--noir-pure);
}

.cart-list {
  padding: 18px 20px;
}

.cart-item {
  display: flex;
  gap: 14px;
  padding: 14px;
  background: var(--creme-light);
  border-radius: 18px;
  margin-bottom: 12px;
  align-items: center;
}

.cart-item-img {
  width: 64px; height: 64px;
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 32px;
  flex-shrink: 0;
}

.cart-item-info { flex: 1; }
.cart-item-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px;
  font-weight: 600;
  color: var(--noir-pure);
}
.cart-item-cat {
  font-size: 10px;
  letter-spacing: 1px;
  color: var(--gray-warm);
  text-transform: uppercase;
  margin-top: 2px;
}
.cart-item-price {
  font-size: 14px;
  font-weight: 700;
  color: var(--bordeaux);
  margin-top: 4px;
}

.qty-control {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--blanc);
  border-radius: 999px;
  padding: 4px;
  border: 1px solid var(--creme);
}

.qty-btn {
  width: 24px; height: 24px;
  border-radius: 50%;
  border: none;
  background: var(--blanc);
  color: var(--bordeaux);
  font-weight: 700;
  cursor: pointer;
  font-size: 14px;
}

.qty-btn:hover { background: var(--rose); }
.qty-num { min-width: 14px; text-align: center; font-size: 12px; font-weight: 700; }

.summary-card {
  margin: 20px;
  padding: 20px;
  background: linear-gradient(135deg, var(--bordeaux-deep), var(--bordeaux));
  color: var(--blanc);
  border-radius: 22px;
  box-shadow: var(--shadow-card);
  position: relative;
  overflow: hidden;
}

.summary-card::before {
  content: '';
  position: absolute;
  top: -30px; right: -30px;
  width: 120px; height: 120px;
  background: radial-gradient(circle, rgba(212,175,96,0.2), transparent 70%);
  border-radius: 50%;
}

.summary-row {
  display: flex;
  justify-content: space-between;
  padding: 6px 0;
  font-size: 13px;
  position: relative;
}

.summary-row.total {
  border-top: 1px dashed rgba(212,175,96,0.3);
  margin-top: 8px;
  padding-top: 12px;
  font-size: 16px;
  font-weight: 700;
}

.summary-row.total span:last-child {
  font-family: 'Cormorant Garamond', serif;
  font-size: 24px;
  color: var(--or-light);
}

.empty-state {
  text-align: center;
  padding: 60px 30px;
  color: var(--gray-warm);
}

.empty-state-emoji { font-size: 64px; margin-bottom: 14px; opacity: 0.6; }

.empty-state h3 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  color: var(--noir-pure);
  margin-bottom: 6px;
}

.empty-state p { font-size: 13px; line-height: 1.6; margin-bottom: 18px; }

/* ================ CHECKOUT ================ */
.checkout-block {
  background: var(--blanc);
  margin: 14px 20px 0;
  padding: 16px;
  border-radius: 18px;
  border: 1px solid var(--creme);
}

.block-label {
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--gray-warm);
  margin-bottom: 8px;
  font-weight: 700;
}

.address-row {
  display: flex;
  gap: 12px;
  align-items: center;
}

.address-icon {
  width: 38px; height: 38px;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--rose), var(--rose-deep));
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  color: var(--bordeaux);
}

.address-text { flex: 1; font-size: 13px; line-height: 1.5; }
.address-text b { font-size: 14px; }
.address-text small { color: var(--gray-warm); display: block; margin-top: 2px; font-size: 11px; }

.payment-options { display: flex; flex-direction: column; gap: 8px; margin-top: 6px; }

.payment-option {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px;
  border: 1.5px solid var(--creme);
  border-radius: 14px;
  cursor: pointer;
  transition: all 0.3s;
  font-size: 13px;
  font-weight: 500;
  background: var(--blanc);
}

.payment-option.selected {
  border-color: var(--rouge);
  background: var(--rose);
}

.payment-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  background: var(--creme-light);
}

.payment-option.selected .payment-icon {
  background: var(--rouge);
  color: var(--blanc);
}

.eta-banner {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 16px;
  background: linear-gradient(135deg, var(--or), var(--or-light));
  margin: 14px 20px 0;
  border-radius: 18px;
  color: var(--bordeaux);
  box-shadow: var(--shadow-gold);
}

.eta-banner-icon { font-size: 24px; }
.eta-banner-text { flex: 1; }
.eta-banner-text b { font-size: 14px; }
.eta-banner-text small { display: block; font-size: 11px; opacity: 0.8; }

.fixed-bottom {
  position: absolute;
  bottom: 88px; left: 0; right: 0;
  padding: 16px 20px 18px;
  background: var(--blanc);
  border-top: 1px solid var(--creme);
  display: flex;
  align-items: center;
  gap: 12px;
  z-index: 9;
  box-shadow: 0 -8px 24px rgba(0, 0, 0, 0.06);
}

.fixed-bottom .summary-mini {
  flex: 1;
}

.summary-mini-label {
  font-size: 10px;
  letter-spacing: 1px;
  color: var(--gray-warm);
  text-transform: uppercase;
}

.summary-mini-val {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 600;
  color: var(--bordeaux);
}

/* ================ TRACKING (com mapa animado) ================ */
.tracking-screen {
  background: var(--blanc);
  height: 100%;
  display: flex;
  flex-direction: column;
}

.map-container {
  height: 380px;
  position: relative;
  background:
    linear-gradient(180deg, #DDE5EA 0%, #C8D5DD 100%);
  overflow: hidden;
}

.map-svg {
  width: 100%;
  height: 100%;
  display: block;
}

.map-overlay {
  position: absolute;
  top: 56px; left: 16px;
  right: 16px;
  display: flex;
  justify-content: space-between;
  z-index: 5;
}

.map-back, .map-help {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: var(--blanc);
  border: none;
  font-size: 16px;
  cursor: pointer;
  box-shadow: var(--shadow-soft);
}

.tracking-card {
  flex: 1;
  background: var(--blanc);
  border-radius: 32px 32px 0 0;
  margin-top: -28px;
  padding: 24px;
  position: relative;
  z-index: 3;
  box-shadow: 0 -10px 30px rgba(0,0,0,0.08);
  overflow-y: auto;
}

.tracking-eta {
  text-align: center;
  margin-bottom: 22px;
}

.tracking-eta-label {
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--rouge);
  font-weight: 700;
  text-transform: uppercase;
}

.tracking-eta-value {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 44px;
  font-weight: 600;
  color: var(--noir-pure);
  line-height: 1;
  margin: 6px 0 4px;
}

.tracking-eta-value em {
  background: linear-gradient(135deg, var(--or), var(--or-light));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  font-style: italic;
}

/* Animação de "preparando pedido" quando não está in_delivery */
.preparing-anim {
  text-align: center;
  padding: 24px 14px 8px;
  background: linear-gradient(135deg, var(--rose), #FFF5F0);
  border-radius: 18px;
  margin-top: 14px;
  position: relative;
  overflow: hidden;
}

.preparing-anim::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 50% 0%, rgba(212, 175, 96, 0.2), transparent 70%);
}

.prep-icon-stack {
  position: relative;
  height: 80px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.prep-icon {
  position: absolute;
  font-size: 48px;
  animation: prepFloat 3s ease-in-out infinite;
}

.prep-icon.box {
  z-index: 2;
}

.prep-icon.sparkle-1 {
  font-size: 22px;
  top: 5px;
  left: 38%;
  animation: sparkle 2s ease-in-out infinite;
}

.prep-icon.sparkle-2 {
  font-size: 18px;
  top: 30px;
  right: 38%;
  animation: sparkle 2s ease-in-out infinite 0.5s;
}

.prep-icon.sparkle-3 {
  font-size: 14px;
  bottom: 8px;
  left: 42%;
  animation: sparkle 2s ease-in-out infinite 1s;
}

@keyframes prepFloat {
  0%, 100% { transform: translateY(0) rotate(-3deg); }
  50% { transform: translateY(-6px) rotate(3deg); }
}

@keyframes sparkle {
  0%, 100% { opacity: 0.3; transform: scale(0.8); }
  50% { opacity: 1; transform: scale(1.2); }
}

.prep-title {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 22px;
  font-weight: 600;
  color: var(--bordeaux);
  margin-bottom: 4px;
  position: relative;
}

.prep-sub {
  font-size: 12px;
  color: var(--gray-warm);
  margin-bottom: 14px;
  position: relative;
}

.prep-loader {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin-bottom: 6px;
}

.prep-dot {
  width: 8px; height: 8px;
  background: var(--rouge);
  border-radius: 50%;
  animation: prepDot 1.4s ease-in-out infinite;
}

.prep-dot:nth-child(2) { animation-delay: 0.2s; }
.prep-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes prepDot {
  0%, 60%, 100% { opacity: 0.3; transform: scale(0.7); }
  30% { opacity: 1; transform: scale(1); }
}

.tracking-eta-sub {
  font-size: 12px;
  color: var(--gray-warm);
}

.tracking-progress {
  display: flex;
  align-items: center;
  margin: 22px 0;
  position: relative;
}

.tracking-step {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
  z-index: 2;
}

.step-dot {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--creme);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  color: var(--gray-mute);
  border: 2px solid var(--creme);
  transition: all 0.5s;
  font-weight: 700;
}

.step-dot.done {
  background: var(--success);
  color: var(--blanc);
  border-color: var(--success);
}

.step-dot.active {
  background: var(--rouge);
  color: var(--blanc);
  border-color: var(--rouge);
  animation: pulse 1.6s infinite;
  box-shadow: 0 0 0 4px rgba(185, 0, 50, 0.2);
}

@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 4px rgba(185, 0, 50, 0.2); }
  50% { box-shadow: 0 0 0 10px rgba(185, 0, 50, 0); }
}

.step-line {
  position: absolute;
  top: 14px;
  left: 14px;
  right: 14px;
  height: 2px;
  background: var(--creme);
  z-index: 1;
}

.step-line-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--success), var(--rouge));
  transition: width 0.8s ease-out;
}

.step-label {
  font-size: 10px;
  font-weight: 600;
  margin-top: 8px;
  text-align: center;
  color: var(--noir-pure);
  max-width: 64px;
  line-height: 1.2;
}

.step-label.muted { color: var(--gray-mute); font-weight: 500; }

/* Card do entregador */
.courier-card {
  margin-top: 18px;
  padding: 16px;
  background: linear-gradient(135deg, var(--bordeaux), var(--bordeaux-deep));
  border-radius: 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  color: var(--blanc);
  position: relative;
  overflow: hidden;
}

.courier-card::before {
  content: '';
  position: absolute;
  bottom: -20px; right: -20px;
  width: 80px; height: 80px;
  background: radial-gradient(circle, rgba(212,175,96,0.3), transparent 70%);
  border-radius: 50%;
}

.courier-avatar {
  width: 52px; height: 52px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--or-light), var(--or));
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  border: 2px solid var(--or-light);
  flex-shrink: 0;
}

.courier-info { flex: 1; position: relative; }
.courier-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  font-weight: 600;
}
.courier-meta {
  font-size: 11px;
  opacity: 0.8;
  display: flex;
  align-items: center;
  gap: 4px;
  margin-top: 2px;
}
.courier-rating { color: var(--or-light); }

.courier-actions {
  display: flex;
  gap: 8px;
  position: relative;
}

.courier-btn {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(212,175,96,0.4);
  color: var(--blanc);
  font-size: 15px;
  cursor: pointer;
  transition: all 0.3s;
}
.courier-btn:hover {
  background: var(--or-light);
  color: var(--bordeaux);
}

.tracking-order-info {
  margin-top: 16px;
  padding: 14px;
  background: var(--creme-light);
  border-radius: 16px;
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  align-items: center;
}

.tracking-order-info b { display: block; font-size: 14px; color: var(--noir-pure); margin-bottom: 2px; }

/* ========== Live Location Card (cliente vê localização) ========== */
.live-location-card {
  margin-top: 14px;
  padding: 16px;
  background: linear-gradient(135deg, #0d0d12 0%, #1a1a24 100%);
  border-radius: 18px;
  color: #d4d4dc;
  position: relative;
  overflow: hidden;
  border: 1px solid rgba(212, 175, 96, 0.2);
}

.live-location-card::before {
  content: '';
  position: absolute;
  top: -30px; right: -30px;
  width: 100px; height: 100px;
  background: radial-gradient(circle, rgba(212, 175, 96, 0.15), transparent 70%);
  border-radius: 50%;
}

.live-loc-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
  position: relative;
}

.live-loc-title {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--or-light);
}

.live-loc-title-dot {
  width: 8px; height: 8px;
  background: #4CAF80;
  border-radius: 50%;
  animation: blink 1.2s infinite;
  box-shadow: 0 0 8px #4CAF80;
}

.live-loc-update {
  font-size: 10px;
  color: #888;
  font-family: 'JetBrains Mono', monospace;
}

.live-loc-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 12px;
}

.live-loc-cell {
  background: rgba(0,0,0,0.3);
  padding: 10px 12px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.05);
}

.live-loc-cell-label {
  font-size: 9px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: #888;
  font-weight: 700;
  margin-bottom: 4px;
}

.live-loc-cell-value {
  font-family: 'JetBrains Mono', monospace;
  color: var(--or-light);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.3px;
}

.live-loc-cell-value.big {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  color: #fff;
  font-weight: 600;
}

.live-loc-cell-value.big small {
  font-family: 'Manrope', sans-serif;
  font-size: 11px;
  font-weight: 500;
  color: #aaa;
  margin-left: 3px;
}

.live-loc-bar {
  height: 4px;
  background: rgba(255,255,255,0.08);
  border-radius: 2px;
  overflow: hidden;
  margin-top: 4px;
}

.live-loc-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--or), var(--or-light));
  border-radius: 2px;
  transition: width 0.5s ease;
  box-shadow: 0 0 12px rgba(212, 175, 96, 0.6);
}

.live-loc-foot {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 10px;
  color: #888;
  font-family: 'Manrope', sans-serif;
  margin-top: 6px;
}

.live-loc-foot .arriving {
  color: #8FE0B0;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* Botões finalizar pedido */
.tracking-actions {
  display: flex;
  gap: 8px;
  margin-top: 16px;
  flex-wrap: wrap;
}

.btn-confirm {
  flex: 1;
  min-width: 100%;
  background: linear-gradient(135deg, var(--success), #4CAF80);
  color: var(--blanc);
  border: none;
  padding: 14px 18px;
  border-radius: 14px;
  font-family: 'Manrope', sans-serif;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: all 0.3s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  box-shadow: 0 6px 18px rgba(46, 125, 91, 0.35);
}

.btn-confirm:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 24px rgba(46, 125, 91, 0.5);
}

.btn-confirm:disabled {
  background: linear-gradient(135deg, #999, #aaa);
  cursor: not-allowed;
  box-shadow: none;
  opacity: 0.6;
}

.btn-demo-skip {
  flex: 1;
  background: transparent;
  color: var(--gray-warm);
  border: 1.5px dashed var(--creme);
  padding: 10px 14px;
  border-radius: 12px;
  font-family: 'Manrope', sans-serif;
  font-weight: 600;
  font-size: 11px;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: all 0.3s;
}

.btn-demo-skip:hover {
  background: var(--creme-light);
  border-style: solid;
  color: var(--bordeaux);
}

/* Status delivered */
.delivered-celebration {
  text-align: center;
  padding: 40px 24px 16px;
}

.check-anim {
  width: 80px; height: 80px;
  margin: 0 auto 18px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--success), #4CAF80);
  display: flex; align-items: center; justify-content: center;
  font-size: 38px;
  color: var(--blanc);
  animation: pop 0.6s ease-out;
  box-shadow: 0 10px 30px rgba(46, 125, 91, 0.4);
}

@keyframes pop {
  0% { transform: scale(0); }
  60% { transform: scale(1.15); }
  100% { transform: scale(1); }
}

.delivered-title {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 28px;
  font-weight: 600;
  color: var(--noir-pure);
  margin-bottom: 6px;
}
.delivered-sub { font-size: 13px; color: var(--gray-warm); }

.rate-section {
  padding: 24px;
  text-align: center;
}

.rate-label {
  font-size: 13px;
  color: var(--gray-warm);
  margin-bottom: 12px;
}

.rate-stars {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-bottom: 24px;
}

.rate-star {
  font-size: 32px;
  color: var(--creme);
  cursor: pointer;
  transition: all 0.2s;
}

.rate-star.lit { color: var(--or); transform: scale(1.1); }

/* ================ FRANCHISE DASHBOARD ================ */
.dash-frame {
  width: min(100%, 1100px);
  max-width: 1100px;
  background: var(--blanc);
  border-radius: 28px;
  box-shadow: var(--shadow-deep);
  overflow: hidden;
  color: var(--noir-pure);
  display: flex;
  flex-direction: column;
  min-height: 720px;
  max-height: calc(100vh - 130px);
}

.dash-header {
  padding: 22px 30px;
  background: linear-gradient(135deg, var(--bordeaux-deep), var(--bordeaux));
  color: var(--blanc);
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: relative;
  overflow: hidden;
}

.dash-header::before {
  content: '';
  position: absolute;
  top: -40px; right: 100px;
  width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(212,175,96,0.18), transparent 70%);
  border-radius: 50%;
}

.dash-store-info {
  position: relative;
  z-index: 1;
}

.dash-store-tag {
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--or-light);
  text-transform: uppercase;
  font-weight: 600;
}

.dash-store-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 26px;
  font-weight: 600;
  margin-top: 2px;
}

.dash-store-status {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-top: 6px;
  font-size: 11px;
  background: rgba(255,255,255,0.1);
  padding: 4px 12px;
  border-radius: 999px;
}

.status-dot-live {
  width: 8px; height: 8px;
  background: #4CAF80;
  border-radius: 50%;
  animation: blink 1.5s infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.dash-metrics {
  display: flex;
  gap: 20px;
  position: relative;
  z-index: 1;
}

.metric {
  text-align: right;
}

.metric-label {
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--or-light);
  text-transform: uppercase;
  font-weight: 600;
}

.metric-value {
  font-family: 'Cormorant Garamond', serif;
  font-size: 24px;
  font-weight: 600;
  margin-top: 2px;
}

.dash-tabs {
  display: flex;
  gap: 2px;
  padding: 0 30px;
  border-bottom: 1px solid var(--creme);
  background: var(--blanc);
}

.dash-tab {
  background: none;
  border: none;
  padding: 16px 20px;
  font-family: 'Manrope', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  cursor: pointer;
  color: var(--gray-warm);
  position: relative;
  transition: color 0.3s;
}

.dash-tab.active {
  color: var(--rouge);
}

.dash-tab.active::after {
  content: '';
  position: absolute;
  bottom: -1px; left: 20px; right: 20px;
  height: 2px;
  background: var(--rouge);
}

.dash-tab-count {
  display: inline-block;
  background: var(--rouge);
  color: var(--blanc);
  font-size: 10px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 999px;
  margin-left: 6px;
}

.dash-tab:not(.active) .dash-tab-count {
  background: var(--creme);
  color: var(--gray-warm);
}

.dash-body {
  flex: 1;
  overflow-y: auto;
  padding: 24px 30px;
  background: var(--creme-light);
}

.order-card {
  background: var(--blanc);
  border-radius: 18px;
  padding: 18px 20px;
  margin-bottom: 14px;
  box-shadow: var(--shadow-soft);
  border-left: 4px solid var(--rouge);
  cursor: pointer;
  transition: all 0.3s;
  display: grid;
  grid-template-columns: auto 1fr auto auto;
  gap: 16px;
  align-items: center;
}

.order-card:hover {
  transform: translateX(4px);
  box-shadow: var(--shadow-card);
}

.order-card.preparing { border-left-color: var(--warn); }
.order-card.ready { border-left-color: var(--or); }
.order-card.in_delivery { border-left-color: var(--noir); }
.order-card.delivered { border-left-color: var(--success); opacity: 0.7; }

.order-num {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 22px;
  font-weight: 600;
  color: var(--noir-pure);
}

.order-num small {
  font-family: 'Manrope', sans-serif;
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--gray-warm);
  text-transform: uppercase;
  display: block;
  font-style: normal;
  font-weight: 600;
}

.order-detail-col h4 {
  font-size: 14px;
  font-weight: 700;
  color: var(--noir-pure);
}

.order-detail-col .order-meta {
  font-size: 11px;
  color: var(--gray-warm);
  margin-top: 2px;
}

.order-detail-col .order-items-mini {
  font-size: 12px;
  color: var(--noir-pure);
  margin-top: 4px;
  font-weight: 500;
}

.order-time {
  text-align: right;
  font-size: 12px;
  color: var(--gray-warm);
}

.order-time-recent {
  color: var(--rouge);
  font-weight: 700;
  animation: blink 2s infinite;
}

.order-value {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 600;
  color: var(--bordeaux);
  text-align: right;
}

.order-value small {
  font-family: 'Manrope', sans-serif;
  font-size: 9px;
  letter-spacing: 1px;
  color: var(--gray-warm);
  text-transform: uppercase;
  display: block;
  font-weight: 600;
}

/* Modal de detalhes do pedido */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(10, 0, 20, 0.7);
  backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
  padding: 30px;
  animation: fadeIn 0.3s;
}

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal-card {
  background: var(--blanc);
  color: var(--noir-pure);
  border-radius: 24px;
  width: 100%;
  max-width: 600px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: var(--shadow-deep);
  animation: slideUp 0.4s cubic-bezier(0.2, 0.9, 0.3, 1);
}

@keyframes slideUp {
  from { transform: translateY(40px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.modal-header {
  padding: 22px 26px;
  background: linear-gradient(135deg, var(--bordeaux-deep), var(--bordeaux));
  color: var(--blanc);
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-radius: 24px 24px 0 0;
}

.modal-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 24px;
  font-weight: 600;
}

.modal-title small {
  display: block;
  font-family: 'Manrope', sans-serif;
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--or-light);
  font-weight: 600;
  text-transform: uppercase;
}

.modal-close {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  border: none;
  color: var(--blanc);
  font-size: 18px;
  cursor: pointer;
}

.modal-body { padding: 24px 26px; }

.modal-section { margin-bottom: 20px; }

.modal-section-label {
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--gray-warm);
  font-weight: 700;
  margin-bottom: 8px;
}

.client-card {
  display: flex;
  gap: 14px;
  align-items: center;
}

.client-avatar {
  width: 48px; height: 48px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--rose), var(--rose-deep));
  color: var(--bordeaux);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cormorant Garamond', serif;
  font-weight: 700;
  font-size: 18px;
}

.client-info b { font-size: 15px; }
.client-info p { font-size: 12px; color: var(--gray-warm); margin-top: 2px; }

.address-card-modal {
  display: flex;
  gap: 14px;
  align-items: flex-start;
  padding: 14px;
  background: var(--creme-light);
  border-radius: 14px;
}

.address-card-modal .address-icon {
  flex-shrink: 0;
}

.address-card-modal .distance-tag {
  display: inline-block;
  background: var(--bordeaux);
  color: var(--or-light);
  font-size: 10px;
  letter-spacing: 1px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 999px;
  margin-top: 6px;
  text-transform: uppercase;
}

.checklist-items { display: flex; flex-direction: column; gap: 8px; }

.check-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  background: var(--creme-light);
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.3s;
}

.check-item:hover { background: var(--rose); }

.check-box {
  width: 22px; height: 22px;
  border-radius: 6px;
  border: 2px solid var(--gray-mute);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
  color: transparent;
  transition: all 0.3s;
}

.check-item.checked .check-box {
  background: var(--success);
  border-color: var(--success);
  color: var(--blanc);
}

.check-item-info { flex: 1; }
.check-item-info b { font-size: 13px; }
.check-item-info p { font-size: 11px; color: var(--gray-warm); margin-top: 1px; }

.check-item.checked .check-item-info b { text-decoration: line-through; color: var(--gray-warm); }

.modal-actions {
  display: flex;
  gap: 10px;
  padding: 16px 26px 22px;
  border-top: 1px solid var(--creme);
}

.modal-actions button { flex: 1; }

/* ================ DELIVERY APP (similar phone frame) ================ */
.delivery-screen {
  background: var(--blanc);
  height: 100%;
  display: flex;
  flex-direction: column;
}

.delivery-header {
  padding: 56px 20px 16px;
  background: linear-gradient(135deg, var(--noir), var(--bordeaux-deep));
  color: var(--blanc);
}

.delivery-greet {
  display: flex;
  align-items: center;
  gap: 12px;
}

.delivery-avatar {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--or-light), var(--or));
  color: var(--bordeaux);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cormorant Garamond', serif;
  font-weight: 700;
  font-size: 18px;
}

.delivery-greet-info { flex: 1; }
.delivery-greet-info b { font-family: 'Cormorant Garamond', serif; font-size: 18px; }
.delivery-greet-info p { font-size: 11px; opacity: 0.8; margin-top: 1px; }

.delivery-online-toggle {
  background: rgba(76, 175, 128, 0.2);
  color: #B5E5C8;
  font-size: 11px;
  font-weight: 700;
  padding: 6px 12px;
  border-radius: 999px;
  border: 1px solid rgba(76, 175, 128, 0.4);
  display: flex;
  align-items: center;
  gap: 6px;
}

.delivery-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-top: 16px;
}

.delivery-stat {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(212,175,96,0.2);
  padding: 10px;
  border-radius: 12px;
  text-align: center;
}

.delivery-stat-label { font-size: 9px; letter-spacing: 1px; opacity: 0.7; text-transform: uppercase; }
.delivery-stat-value { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 600; margin-top: 2px; color: var(--or-light); }

.delivery-job-card {
  margin: 16px 20px;
  padding: 18px;
  background: var(--blanc);
  border: 2px solid var(--or-light);
  border-radius: 22px;
  box-shadow: var(--shadow-card);
  position: relative;
}

.delivery-job-card::before {
  content: 'NOVA CORRIDA';
  position: absolute;
  top: -10px; left: 16px;
  background: linear-gradient(135deg, var(--or-light), var(--or));
  color: var(--bordeaux);
  font-size: 9px;
  font-weight: 800;
  letter-spacing: 2px;
  padding: 4px 10px;
  border-radius: 999px;
}

.job-route {
  display: flex;
  flex-direction: column;
  gap: 14px;
  margin: 14px 0;
  position: relative;
}

.job-stop {
  display: flex;
  gap: 12px;
  align-items: flex-start;
}

.stop-marker {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
  flex-shrink: 0;
  z-index: 2;
}

.stop-marker.pickup {
  background: var(--bordeaux);
  color: var(--or-light);
}

.stop-marker.dropoff {
  background: linear-gradient(135deg, var(--or-light), var(--or));
  color: var(--bordeaux);
}

.job-route::before {
  content: '';
  position: absolute;
  top: 28px; bottom: 28px; left: 13px;
  width: 2px;
  background: linear-gradient(180deg, var(--bordeaux), var(--or));
  z-index: 1;
}

.stop-info b { font-size: 13px; display: block; }
.stop-info p { font-size: 11px; color: var(--gray-warm); margin-top: 2px; line-height: 1.4; }

.job-pay {
  display: flex;
  justify-content: space-between;
  padding-top: 14px;
  border-top: 1px dashed var(--creme);
  align-items: center;
}

.job-pay-label { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--gray-warm); font-weight: 700; }
.job-pay-value {
  font-family: 'Cormorant Garamond', serif;
  font-size: 26px;
  font-weight: 600;
  color: var(--bordeaux);
}

.delivery-action {
  margin: 0 20px;
  padding-bottom: 100px;
}

/* ================ NOTIFICATIONS ================ */
.toast-container {
  position: fixed;
  top: 80px;
  right: 30px;
  z-index: 1000;
  display: flex;
  flex-direction: column;
  gap: 10px;
  pointer-events: none;
}

.toast {
  background: var(--blanc);
  color: var(--noir-pure);
  padding: 14px 18px;
  border-radius: 16px;
  box-shadow: var(--shadow-deep);
  font-size: 13px;
  display: flex;
  align-items: center;
  gap: 12px;
  min-width: 280px;
  border-left: 4px solid var(--rouge);
  animation: slideIn 0.4s, slideOut 0.4s 4s forwards;
  pointer-events: auto;
}

@keyframes slideIn {
  from { transform: translateX(380px); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

@keyframes slideOut {
  to { transform: translateX(380px); opacity: 0; }
}

.toast-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: var(--rose);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}

.toast-text { flex: 1; }
.toast-text b { display: block; font-size: 13px; }
.toast-text small { font-size: 11px; color: var(--gray-warm); }

/* ================ PAINEL UBER DIRECT (Webhook Simulator) ================ */
.uber-panel {
  width: 100%;
  max-width: 480px;
  background: linear-gradient(145deg, #0d0d12, #1a1a24);
  color: #d4d4dc;
  border-radius: 22px;
  padding: 18px;
  border: 1px solid rgba(170, 130, 50, 0.25);
  box-shadow: var(--shadow-deep);
  font-family: 'JetBrains Mono', 'Fira Code', monospace;
  height: fit-content;
  max-height: calc(100vh - 130px);
  display: flex;
  flex-direction: column;
}

.uber-panel-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
  padding-bottom: 12px;
  border-bottom: 1px solid rgba(170, 130, 50, 0.2);
}

.uber-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: 'Manrope', sans-serif;
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.uber-brand-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: #4CAF80;
  animation: blink 1.5s infinite;
  box-shadow: 0 0 10px #4CAF80;
}

.uber-status {
  font-size: 10px;
  letter-spacing: 1px;
  background: rgba(76, 175, 128, 0.15);
  color: #8FE0B0;
  padding: 4px 10px;
  border-radius: 999px;
  border: 1px solid rgba(76, 175, 128, 0.3);
  font-family: 'Manrope', sans-serif;
  font-weight: 700;
}

.uber-status.idle {
  background: rgba(170, 130, 50, 0.1);
  color: var(--or-light);
  border-color: rgba(170, 130, 50, 0.3);
}

.uber-controls {
  display: flex;
  gap: 6px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}

.uber-ctrl-btn {
  flex: 1;
  min-width: 80px;
  background: rgba(170, 130, 50, 0.15);
  color: var(--or-light);
  border: 1px solid rgba(170, 130, 50, 0.3);
  padding: 8px 10px;
  border-radius: 10px;
  font-family: 'Manrope', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
}

.uber-ctrl-btn:hover {
  background: rgba(170, 130, 50, 0.3);
  transform: translateY(-1px);
}

.uber-ctrl-btn.active {
  background: linear-gradient(135deg, var(--or-light), var(--or));
  color: var(--bordeaux);
  border-color: var(--or-light);
}

.uber-ctrl-btn.danger {
  background: rgba(185, 0, 50, 0.15);
  color: #E68FA0;
  border-color: rgba(185, 0, 50, 0.3);
}

.uber-meta-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 12px;
  font-size: 10px;
}

.uber-meta-cell {
  background: rgba(0, 0, 0, 0.3);
  padding: 8px 10px;
  border-radius: 8px;
  border: 1px solid rgba(255, 255, 255, 0.05);
}

.uber-meta-label {
  color: #888;
  letter-spacing: 1px;
  text-transform: uppercase;
  font-size: 9px;
  font-weight: 600;
}

.uber-meta-value {
  color: var(--or-light);
  font-weight: 700;
  font-size: 12px;
  margin-top: 2px;
}

.uber-meta-value .small {
  font-size: 10px;
  color: #aaa;
  font-weight: 400;
}

.uber-console-label {
  font-size: 10px;
  letter-spacing: 1px;
  color: #888;
  text-transform: uppercase;
  font-weight: 700;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-family: 'Manrope', sans-serif;
}

.uber-console-label small {
  color: var(--or-light);
  font-size: 9px;
}

.uber-console {
  flex: 1;
  background: #08080c;
  border: 1px solid rgba(170, 130, 50, 0.2);
  border-radius: 12px;
  padding: 10px;
  overflow-y: auto;
  font-size: 10px;
  line-height: 1.5;
  min-height: 200px;
  max-height: 380px;
}

.uber-console::-webkit-scrollbar { width: 6px; }
.uber-console::-webkit-scrollbar-thumb { background: rgba(170, 130, 50, 0.3); border-radius: 3px; }

.webhook-event {
  border-left: 3px solid var(--or);
  padding: 8px 10px;
  margin-bottom: 8px;
  background: rgba(170, 130, 50, 0.04);
  border-radius: 0 8px 8px 0;
  animation: slideInLeft 0.3s ease-out;
}

@keyframes slideInLeft {
  from { transform: translateX(-12px); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

.webhook-event.status { border-left-color: var(--rouge); background: rgba(185, 0, 50, 0.08); }
.webhook-event.location { border-left-color: var(--or); }
.webhook-event.delivered { border-left-color: var(--success); background: rgba(46, 125, 91, 0.08); }

.webhook-head {
  display: flex;
  justify-content: space-between;
  font-size: 9px;
  margin-bottom: 4px;
}

.webhook-type {
  color: var(--or-light);
  font-weight: 700;
  letter-spacing: 0.5px;
}

.webhook-event.status .webhook-type { color: #FF8FA0; }
.webhook-event.delivered .webhook-type { color: #8FE0B0; }

.webhook-time {
  color: #666;
  font-family: 'JetBrains Mono', monospace;
}

.webhook-body {
  color: #d4d4dc;
  font-family: 'JetBrains Mono', 'Fira Code', monospace;
  font-size: 10px;
  line-height: 1.5;
  white-space: pre;
  overflow-x: auto;
}

.webhook-body .key { color: #8FB6E0; }
.webhook-body .str { color: #C5E0A0; }
.webhook-body .num { color: #E0B488; }
.webhook-body .bool { color: #E0888F; }

.uber-empty {
  text-align: center;
  padding: 30px 20px;
  color: #666;
  font-family: 'Manrope', sans-serif;
  font-size: 11px;
  line-height: 1.6;
}

.uber-empty .pulse {
  display: inline-block;
  margin-bottom: 10px;
  font-size: 28px;
  animation: pulse-soft 2s infinite;
}

@keyframes pulse-soft {
  0%, 100% { opacity: 0.4; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.1); }
}

/* Dual layout: phone + uber panel side by side */
.tracking-stage {
  display: flex;
  gap: 30px;
  align-items: flex-start;
  justify-content: center;
  width: 100%;
  flex-wrap: wrap;
}

/* Tooltip de info */
.uber-info-toast {
  position: absolute;
  top: 64px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(10, 10, 14, 0.95);
  color: var(--or-light);
  font-size: 11px;
  padding: 8px 14px;
  border-radius: 999px;
  font-family: 'Manrope', sans-serif;
  font-weight: 600;
  letter-spacing: 0.5px;
  border: 1px solid rgba(170, 130, 50, 0.3);
  z-index: 20;
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
  animation: fadeIn 0.4s;
  backdrop-filter: blur(10px);
  pointer-events: none;
}

.uber-info-toast .pulse-dot {
  width: 6px; height: 6px;
  background: var(--or-light);
  border-radius: 50%;
  animation: blink 1s infinite;
}

/* ================ ✨ MICRO-INTERAÇÕES PREMIUM ================ */

/* 🛫 Projétil voando ao carrinho */
.fly-projectile {
  position: absolute;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, #FFFFFF, #F4DCA0 40%, #D4AF60 70%, #AA8232);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  z-index: 999;
  pointer-events: none;
  box-shadow:
    0 0 20px rgba(244, 220, 160, 0.8),
    0 0 40px rgba(212, 175, 96, 0.5),
    0 4px 12px rgba(170, 130, 50, 0.6);
  filter: drop-shadow(0 0 8px rgba(244, 220, 160, 0.6));
  will-change: transform, opacity;
}

/* Carrinho recebendo (pulse no ícone) */
.nav-cart-ico.cart-receive {
  animation: cartReceive 0.5s cubic-bezier(0.2, 1.6, 0.5, 1);
}

@keyframes cartReceive {
  0% { transform: scale(1); }
  30% { transform: scale(1.4) rotate(-10deg); filter: drop-shadow(0 0 8px var(--or-light)); }
  60% { transform: scale(0.9) rotate(5deg); }
  100% { transform: scale(1) rotate(0); }
}

/* 🎉 Confete dourado */
.confetti-container {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 1000;
  overflow: hidden;
}

.confetti-piece {
  position: absolute;
  width: 8px;
  height: 8px;
  border-radius: 2px;
  pointer-events: none;
  will-change: transform, opacity;
}

@keyframes confettiFall {
  0% {
    transform: translate(0, 0) rotate(0deg);
    opacity: 1;
  }
  60% {
    opacity: 1;
  }
  100% {
    transform: translate(var(--tx), var(--ty)) rotate(var(--rotate));
    opacity: 0;
  }
}

/* 📦 Badge de quantidade no card de produto */
.product-qty-badge {
  position: absolute;
  bottom: 8px;
  right: 8px;
  min-width: 24px;
  height: 24px;
  padding: 0 6px;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--bordeaux), var(--rouge));
  color: var(--blanc);
  font-family: 'Manrope', sans-serif;
  font-weight: 800;
  font-size: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 2px solid var(--blanc);
  box-shadow: 0 3px 10px rgba(185, 0, 50, 0.4);
  z-index: 3;
  animation: qtyAppear 0.5s cubic-bezier(0.2, 1.4, 0.4, 1);
}

.product-qty-badge.pulse {
  animation: qtyPulse 0.4s ease-out;
}

@keyframes qtyAppear {
  0% { transform: scale(0); }
  60% { transform: scale(1.3); }
  100% { transform: scale(1); }
}

@keyframes qtyPulse {
  0% { transform: scale(1); box-shadow: 0 3px 10px rgba(185, 0, 50, 0.4); }
  50% { transform: scale(1.25); box-shadow: 0 4px 14px rgba(185, 0, 50, 0.6); }
  100% { transform: scale(1); box-shadow: 0 3px 10px rgba(185, 0, 50, 0.4); }
}

/* ================ 🌅 SUNRISE LOADER ================ */
.sunrise-loader {
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: linear-gradient(180deg, #FFF5F0 0%, #FFE9C4 50%, #FFE0D8 100%);
  padding: 40px 30px;
  position: relative;
  overflow: hidden;
}

.sunrise-stage {
  width: 280px;
  max-width: 90%;
  margin-bottom: 24px;
  border-radius: 24px;
  overflow: hidden;
  box-shadow: 0 14px 40px rgba(170, 130, 50, 0.2);
  background: linear-gradient(180deg, #FFE0D8, #F5C5BA);
  position: relative;
}

.sunrise-svg {
  width: 100%;
  display: block;
}

.sun-glow {
  animation: sunGlow 2s ease-in-out infinite;
  transform-origin: 140px 145px;
}

.sun-core {
  animation: sunRise 2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  transform-origin: 140px 145px;
}

.sun-rays {
  animation: rayRotate 8s linear infinite, sunRise 2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
}

@keyframes sunRise {
  0% { transform: translateY(60px); opacity: 0; }
  100% { transform: translateY(0); opacity: 1; }
}

@keyframes sunGlow {
  0%, 100% { opacity: 0.6; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.15); }
}

@keyframes rayRotate {
  to { transform: rotate(360deg); }
}

.sunrise-birds {
  animation: birdsFly 4s ease-in-out infinite;
}

@keyframes birdsFly {
  0%, 100% { transform: translateX(0); }
  50% { transform: translateX(20px); }
}

.sunrise-text {
  text-align: center;
  color: var(--bordeaux);
  animation: textFadeIn 1s ease-out 0.6s both;
}

@keyframes textFadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.sunrise-eyebrow {
  font-size: 9px;
  letter-spacing: 6px;
  font-weight: 600;
  color: var(--or);
  margin-bottom: 8px;
}

.sunrise-title {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 32px;
  font-weight: 600;
  line-height: 1.05;
  margin-bottom: 10px;
}

.sunrise-sub {
  font-size: 13px;
  color: var(--gray-warm);
  font-weight: 500;
  display: inline-flex;
  align-items: baseline;
}

.sunrise-dots {
  display: inline-flex;
  margin-left: 4px;
}

.sunrise-dots span {
  display: inline-block;
  animation: dotBounce 1.4s ease-in-out infinite;
}

.sunrise-dots span:nth-child(2) { animation-delay: 0.2s; }
.sunrise-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes dotBounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-3px); opacity: 1; }
}

/* ================ 🔄 PULL TO REFRESH ================ */
.pull-indicator {
  position: absolute;
  top: -50px;
  left: 50%;
  transform: translateX(-50%) translateY(0);
  width: 60px;
  height: 60px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 10;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}

.pull-sun {
  width: 44px;
  height: 44px;
