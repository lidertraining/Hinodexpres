// Cliente confirma o recebimento manualmente
function confirmReceipt(orderId) {
  const order = STATE.orders.find(o => o.id === orderId);
  if (!order) return;
  order.status = 'delivered';
  UberSim.stop();
  UberSim.state.status = 'delivered';
  UberSim.emitStatusWebhook && UberSim.emitStatusWebhook('delivered', orderId);
  toast('Pedido confirmado! ✨', 'Obrigado por escolher a Hinode', '🎉');
  setTimeout(() => goClient('delivered'), 600);
}

// Pular simulação direto pra entrega (demo)
function skipToDelivery(orderId) {
  const order = STATE.orders.find(o => o.id === orderId);
  if (!order) return;
  // Avança a simulação até o final
  UberSim.state.pointIndex = ROUTE.length - 2;
  UberSim.state.routeProgress = 0.95;
  UberSim.state.coords = { ...DROPOFF_COORDS };
  UberSim.state.coordsTarget = { ...DROPOFF_COORDS };
  toast('⏩ Avançando...', 'Motoboy está chegando!', '🛵');
  renderStage();
}

/* =========================================================
   UBER DIRECT SIMULATOR
   Simula fielmente os webhooks da Uber Direct API:
   - event.delivery_status (mudanças de fase)
   - event.courier_update (lat/lng a cada 20s, mas em modo demo
     usamos um intervalo menor para não demorar)
   ========================================================= */

// Coordenadas reais aproximadas (Jardins, São Paulo)
const PICKUP_COORDS = { lat: -23.5615, lng: -46.6720 };  // Hinode Jardins
const DROPOFF_COORDS = { lat: -23.5505, lng: -46.6555 }; // Cliente

// Pontos da rota (gerados como bezier curve simulando ruas)
function generateRoutePoints(start, end, count = 20) {
  const points = [];
  // Adiciona "ruído" para simular ruas reais
  for (let i = 0; i <= count; i++) {
    const t = i / count;
    // Curva de Bezier com control point que dá um caminho mais "urbano"
    const cp1 = {
      lat: start.lat + (end.lat - start.lat) * 0.3 + 0.0008,
      lng: start.lng + (end.lng - start.lng) * 0.5 - 0.0010
    };
    const cp2 = {
      lat: start.lat + (end.lat - start.lat) * 0.7 - 0.0005,
      lng: start.lng + (end.lng - start.lng) * 0.6 + 0.0008
    };
    // Bezier cúbica
    const lat = Math.pow(1-t, 3) * start.lat
              + 3 * Math.pow(1-t, 2) * t * cp1.lat
              + 3 * (1-t) * Math.pow(t, 2) * cp2.lat
              + Math.pow(t, 3) * end.lat;
    const lng = Math.pow(1-t, 3) * start.lng
              + 3 * Math.pow(1-t, 2) * t * cp1.lng
              + 3 * (1-t) * Math.pow(t, 2) * cp2.lng
              + Math.pow(t, 3) * end.lng;
    points.push({ lat, lng, t });
  }
  return points;
}

const ROUTE = generateRoutePoints(PICKUP_COORDS, DROPOFF_COORDS, 18);

const UberSim = {
  state: {
    deliveryId: null,
    status: 'idle', // idle, pending, pickup, dropoff, delivered
    routeProgress: 0, // 0..1
    coords: { ...PICKUP_COORDS },
    coordsTarget: { ...PICKUP_COORDS },
    webhooks: [], // log dos webhooks
    speedMultiplier: 1, // 1x, 2x, 5x
    timer: null,
    smoothTimer: null,
    pointIndex: 0
  },

  // Inicia simulação quando pedido é despachado
  start(orderId) {
    this.stop(); // limpar simulação anterior
    const s = this.state;
    s.deliveryId = `del_${orderId.replace('HND-', '')}_${Date.now().toString(36)}`;
    s.status = 'pending';
    s.routeProgress = 0;
    s.coords = { ...PICKUP_COORDS };
    s.coordsTarget = { ...PICKUP_COORDS };
    s.webhooks = [];
    s.pointIndex = 0;

    // Webhook 1: delivery_status pending → pickup
    this.emitStatusWebhook('pickup', orderId);

    // Inicia o ciclo de courier_update (a cada ~3 segundos no modo demo)
    s.timer = setInterval(() => this.tick(orderId), 3000 / s.speedMultiplier);

    // Inicia interpolação suave (60fps)
    this.startSmoothing();
  },

  startSmoothing() {
    const s = this.state;
    if (s.smoothTimer) clearInterval(s.smoothTimer);
    s.smoothTimer = setInterval(() => {
      // Lerp da posição atual em direção ao alvo
      const lerpFactor = 0.04;
      s.coords.lat += (s.coordsTarget.lat - s.coords.lat) * lerpFactor;
      s.coords.lng += (s.coordsTarget.lng - s.coords.lng) * lerpFactor;
      this.updateMapVisuals();
    }, 33); // ~30fps
  },

  tick(orderId) {
    const s = this.state;
    s.pointIndex++;

    if (s.pointIndex >= ROUTE.length) {
      // Chegou ao destino
      this.emitStatusWebhook('delivered', orderId);
      this.stop();
      // Atualizar order
      const order = STATE.orders.find(o => o.id === orderId);
      if (order) {
        order.status = 'delivered';
      }
      // Se o cliente está vendo o tracking, vai pra delivered
      if (STATE.view === 'client' && STATE.activeOrderId === orderId) {
        toast('Entregue! 🎉', 'Aproveite seus produtos Hinode', '✓');
        setTimeout(() => goClient('delivered'), 800);
      }
      return;
    }

    const point = ROUTE[s.pointIndex];
    s.coordsTarget = { lat: point.lat, lng: point.lng };
    s.routeProgress = point.t;

    // Quando chega na franquia (primeiros pontos), muda pra dropoff
    if (s.pointIndex === 1 && s.status === 'pickup') {
      s.status = 'dropoff';
      this.emitStatusWebhook('dropoff', orderId);
    }

    // Emitir courier_update webhook
    this.emitCourierUpdateWebhook(orderId, point);

    // Re-render se estiver vendo tracking
    if (STATE.view === 'client' && STATE.clientScreen === 'tracking') {
      // Apenas atualizar painel uber + mapa, não re-renderizar app inteiro
      updateUberPanel();
      updateTrackingMap();
    }
  },

  emitStatusWebhook(newStatus, orderId) {
    const s = this.state;
    s.status = newStatus;

    const payload = {
      kind: 'event.delivery_status',
      created: new Date().toISOString(),
      status: newStatus,
      delivery_id: s.deliveryId,
      data: {
        id: s.deliveryId,
        external_id: orderId,
        status: newStatus,
        pickup: { address: 'R. Oscar Freire, 1242 - Jardins, São Paulo - SP' },
        dropoff: { address: 'R. Augusta, 2356 - Apto 89, Consolação' },
        courier: newStatus === 'pickup' || newStatus === 'dropoff' ? {
          name: 'Lucas F.',
          rating: '4.90',
          vehicle_type: 'motorcycle',
          vehicle_make: 'Honda',
          vehicle_model: 'CG 160',
          vehicle_color: 'red',
          vehicle_license_plate: '**2384',
          phone_number: '+55*****8745',
          public_phone_info: {
            formatted_phone_number: '+551140049999,4823',
            phone_number: '+551140049999',
            pin_code: '4823'
          }
        } : null
      }
    };

    s.webhooks.unshift({
      type: 'delivery_status',
      time: new Date().toLocaleTimeString('pt-BR'),
      timestamp: Date.now(),
      payload
    });

    if (s.webhooks.length > 12) s.webhooks.pop();
    updateUberPanel();
  },

  emitCourierUpdateWebhook(orderId, point) {
    const s = this.state;
    const payload = {
      kind: 'event.courier_update',
      created: new Date().toISOString(),
      delivery_id: s.deliveryId,
      data: {
        id: s.deliveryId,
        external_id: orderId,
        status: s.status,
        courier_imminent: s.routeProgress > 0.85,
        courier: {
          name: 'Lucas F.',
          location: {
            lat: parseFloat(point.lat.toFixed(6)),
            lng: parseFloat(point.lng.toFixed(6))
          },
          phone_number: '+55*****8745',
          rating: '4.90',
          vehicle_color: 'red',
          vehicle_make: 'Honda',
          vehicle_model: 'CG 160',
          vehicle_type: 'motorcycle',
          vehicle_license_plate: '**2384'
        }
      }
    };

    s.webhooks.unshift({
      type: 'courier_update',
      time: new Date().toLocaleTimeString('pt-BR'),
      timestamp: Date.now(),
      payload
    });

    if (s.webhooks.length > 12) s.webhooks.pop();
  },

  updateMapVisuals() {
    const moto = document.getElementById('moto-marker');
    const s = this.state;

    // Mover marker do motoboy
    if (moto) {
      const svgX = latLngToSvgX(s.coords.lng);
      const svgY = latLngToSvgY(s.coords.lat);
      moto.setAttribute('transform', `translate(${svgX}, ${svgY})`);
    }

    // Atualizar info toast (lat/lng) no topo do mapa
    const toastEl = document.getElementById('map-coords-toast');
    if (toastEl) {
      toastEl.textContent = `📡 lat ${s.coords.lat.toFixed(5)}, lng ${s.coords.lng.toFixed(5)}`;
    }

    // Atualizar card de live location em tempo real (lat/lng grandes)
    const latEl = document.getElementById('live-loc-lat');
    if (latEl) latEl.textContent = s.coords.lat.toFixed(6);
    const lngEl = document.getElementById('live-loc-lng');
    if (lngEl) lngEl.textContent = s.coords.lng.toFixed(6);

    // Distância em tempo real (haversine)
    const distanceEl = document.getElementById('live-loc-distance');
    if (distanceEl) {
      const remainingDistance = haversineDistance(s.coords, DROPOFF_COORDS);
      const formatted = fmtDistance(remainingDistance);
      const parts = formatted.split(' ');
      distanceEl.innerHTML = parts[0] + '<small>' + (parts[1] || '') + '</small>';
    }
  },

  setSpeed(mult) {
    const s = this.state;
    s.speedMultiplier = mult;
    if (s.timer) {
      clearInterval(s.timer);
      const order = STATE.orders.find(o => o.id === STATE.activeOrderId);
      if (order) {
        s.timer = setInterval(() => this.tick(order.id), 3000 / s.speedMultiplier);
      }
    }
    updateUberPanel();
  },

  stop() {
    const s = this.state;
    if (s.timer) clearInterval(s.timer);
    if (s.smoothTimer) clearInterval(s.smoothTimer);
    s.timer = null;
    s.smoothTimer = null;
  },

  reset() {
    this.stop();
    this.state.webhooks = [];
    this.state.status = 'idle';
    this.state.routeProgress = 0;
    this.state.coords = { ...PICKUP_COORDS };
    this.state.coordsTarget = { ...PICKUP_COORDS };
    this.state.pointIndex = 0;
    updateUberPanel();
  }
};

// Mapeamento lat/lng → coordenadas SVG
// Bounding box aproximado (delta latlng → svg 0..400 / 0..380)
const SVG_BOUNDS = {
  minLat: -23.5640, maxLat: -23.5485,
  minLng: -46.6735, maxLng: -46.6540
};
function latLngToSvgX(lng) {
  const t = (lng - SVG_BOUNDS.minLng) / (SVG_BOUNDS.maxLng - SVG_BOUNDS.minLng);
  return 50 + t * 300; // padding lateral
}
function latLngToSvgY(lat) {
  const t = (SVG_BOUNDS.maxLat - lat) / (SVG_BOUNDS.maxLat - SVG_BOUNDS.minLat);
  return 80 + t * 220;
}

function renderMap(status) {
  const sim = UberSim.state;
  const motoX = latLngToSvgX(sim.coords.lng);
  const motoY = latLngToSvgY(sim.coords.lat);
  const showMoto = status === 'in_delivery';

  // Pontos da rota em SVG
  const routeSvgPath = ROUTE.map((p, i) => {
    const x = latLngToSvgX(p.lng);
    const y = latLngToSvgY(p.lat);
    return (i === 0 ? 'M' : 'L') + ' ' + x + ' ' + y;
  }).join(' ');

  return `
    <svg class="map-svg" viewBox="0 0 400 380" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="streets" patternUnits="userSpaceOnUse" width="60" height="60">
          <rect width="60" height="60" fill="#DDE5EA"/>
          <path d="M0 30 L60 30 M30 0 L30 60" stroke="#FFF" stroke-width="3"/>
          <path d="M0 30 L60 30 M30 0 L30 60" stroke="#C8D5DD" stroke-width="0.5"/>
        </pattern>
        <linearGradient id="route-grad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0" stop-color="#370014"/>
          <stop offset="1" stop-color="#AA8232"/>
        </linearGradient>
        <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
          <feOffset dx="0" dy="2"/>
          <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
          <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <rect width="400" height="380" fill="url(#streets)"/>

      <!-- Avenidas principais -->
      <rect x="0" y="170" width="400" height="14" fill="#F4F0EA" opacity="0.95"/>
      <rect x="190" y="0" width="14" height="380" fill="#F4F0EA" opacity="0.95"/>

      <!-- Parques/blocos verdes -->
      <rect x="40" y="60" width="60" height="50" rx="6" fill="#B5D4C2" opacity="0.6"/>
      <rect x="280" y="220" width="80" height="60" rx="6" fill="#B5D4C2" opacity="0.6"/>
      <circle cx="320" cy="80" r="20" fill="#B5D4C2" opacity="0.6"/>

      <!-- Rota completa (tracejada) -->
      <path d="${routeSvgPath}"
            fill="none"
            stroke="url(#route-grad)"
            stroke-width="4"
            stroke-linecap="round"
            stroke-dasharray="8,6"
            opacity="0.7"/>

      <!-- Trail percorrido (sólido) -->
      ${showMoto && sim.pointIndex > 0 ? `
        <path d="${ROUTE.slice(0, sim.pointIndex + 1).map((p, i) => {
          const x = latLngToSvgX(p.lng);
          const y = latLngToSvgY(p.lat);
          return (i === 0 ? 'M' : 'L') + ' ' + x + ' ' + y;
        }).join(' ')}"
              fill="none"
              stroke="#AA8232"
              stroke-width="5"
              stroke-linecap="round"
              opacity="0.95"/>
      ` : ''}

      <!-- Pin franquia -->
      <g transform="translate(${latLngToSvgX(PICKUP_COORDS.lng)}, ${latLngToSvgY(PICKUP_COORDS.lat)})" filter="url(#shadow)">
        <circle r="18" fill="#370014"/>
        <circle r="14" fill="#B90032"/>
        <text y="5" text-anchor="middle" font-size="14" font-family="serif" font-weight="bold" fill="#D4AF60">H</text>
      </g>
      <text x="${latLngToSvgX(PICKUP_COORDS.lng)}" y="${latLngToSvgY(PICKUP_COORDS.lat) + 35}" text-anchor="middle" font-size="9" font-weight="700" fill="#370014" font-family="Manrope">FRANQUIA</text>

      <!-- Pin destino -->
      <g transform="translate(${latLngToSvgX(DROPOFF_COORDS.lng)}, ${latLngToSvgY(DROPOFF_COORDS.lat)})" filter="url(#shadow)">
        <circle r="16" fill="#AA8232"/>
        <circle r="12" fill="#D4AF60"/>
        <text y="4" text-anchor="middle" font-size="14">📍</text>
      </g>
      <text x="${latLngToSvgX(DROPOFF_COORDS.lng)}" y="${latLngToSvgY(DROPOFF_COORDS.lat) + 35}" text-anchor="middle" font-size="9" font-weight="700" fill="#370014" font-family="Manrope">VOCÊ</text>

      <!-- Motoboy (posição interpolada) -->
      ${showMoto ? `
        <g id="moto-marker" transform="translate(${motoX}, ${motoY})">
          <circle r="22" fill="#AA8232" opacity="0.3">
            <animate attributeName="r" values="18;28;18" dur="2s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0.4;0;0.4" dur="2s" repeatCount="indefinite"/>
          </circle>
          <circle r="14" fill="#FFF" stroke="#370014" stroke-width="2"/>
          <text y="5" text-anchor="middle" font-size="16">🛵</text>
        </g>
      ` : ''}
    </svg>
  `;
}

function advanceOrderForDemo(orderId) {
  const order = STATE.orders.find(o => o.id === orderId);
  if (!order) return;
  const idx = STEPS.indexOf(order.status);
  if (idx < STEPS.length - 1) {
    order.status = STEPS[idx + 1];
    if (order.status === 'in_delivery') {
      toast('A caminho!', `${order.number} saiu para entrega`, '🛵');
      UberSim.start(order.id);
    }
    if (order.status === 'delivered') {
      toast('Entregue ✓', 'Aproveite seus produtos!', '🎉');
      goClient('delivered');
      return;
    }
  }
  renderStage();
}

function rateOrder(n) {

}

function finishAndRestart() {

  goClient('home');
}

/* =========================================================
   FRANCHISE DASHBOARD
   ========================================================= */
let franchiseTab = 'received';
let modalOrderId = null;

function renderFranchise() {

    ready: STATE.orders.filter(o => o.status === 'ready').length,
    in_delivery: STATE.orders.filter(o => o.status === 'in_delivery').length,

  };
  const totalToday = STATE.orders.reduce((s, o) => s + o.total, 0);
  const filteredOrders = STATE.orders.filter(o => o.status === franchiseTab);

  wrap.innerHTML = `
    <div class="dash-header">
      <div class="dash-store-info">
        <div class="dash-store-tag">Franquia</div>
        <div class="dash-store-name">Hinode Jardins</div>
        <div class="dash-store-status">
          <span class="status-dot-live"></span>
          <span>Online • Pronto para receber</span>
        </div>
      </div>
      <div class="dash-metrics">
        <div class="metric">
          <div class="metric-label">Pedidos hoje</div>
          <div class="metric-value">${STATE.orders.length}</div>
        </div>
        <div class="metric">
          <div class="metric-label">Faturamento</div>
          <div class="metric-value">${fmt(totalToday)}</div>
        </div>
        <div class="metric">
          <div class="metric-label">Ticket médio</div>
          <div class="metric-value">${fmt(totalToday / Math.max(STATE.orders.length, 1))}</div>
        </div>
      </div>
    </div>

    <div class="dash-tabs">
      <button class="dash-tab ${franchiseTab === 'received' ? 'active' : ''}" onclick="setFranchiseTab('received')">Novos <span class="dash-tab-count">${counts.received}</span></button>
      <button class="dash-tab ${franchiseTab === 'preparing' ? 'active' : ''}" onclick="setFranchiseTab('preparing')">Em preparo <span class="dash-tab-count">${counts.preparing}</span></button>
      <button class="dash-tab ${franchiseTab === 'ready' ? 'active' : ''}" onclick="setFranchiseTab('ready')">Prontos <span class="dash-tab-count">${counts.ready}</span></button>
      <button class="dash-tab ${franchiseTab === 'in_delivery' ? 'active' : ''}" onclick="setFranchiseTab('in_delivery')">A caminho <span class="dash-tab-count">${counts.in_delivery}</span></button>
      <button class="dash-tab ${franchiseTab === 'delivered' ? 'active' : ''}" onclick="setFranchiseTab('delivered')">Entregues <span class="dash-tab-count">${counts.delivered}</span></button>
    </div>

    <div class="dash-body">
      ${filteredOrders.length === 0 ? `
        <div class="empty-state" style="background:white;border-radius:18px;">

}

function setFranchiseTab(tab) {
  franchiseTab = tab;
  renderStage();
}

function renderOrderCard(o) {
  const itemsMini = o.items.map(i => `${i.qty}× ${i.name}`).join(' • ');
  const sinceMin = Math.floor((Date.now() - o.createdAt) / 1000 / 60);
  return `
    <div class="order-card ${o.status}" onclick="openOrderModal('${o.id}')">
      <div class="order-num">
        <small>Pedido</small>
        ${o.number}
      </div>
      <div class="order-detail-col">
        <h4>${o.customer} <span style="display:inline-block;background:linear-gradient(135deg,var(--success),#4CAF80);color:white;font-size:9px;font-weight:700;padding:2px 8px;border-radius:999px;letter-spacing:0.5px;margin-left:6px;vertical-align:middle;">✓ PAGO HINODE</span></h4>
        <div class="order-meta">📍 ${o.address} • ${o.distance} km</div>
        <div class="order-items-mini">${itemsMini}</div>
      </div>
      <div class="order-time ${sinceMin < 3 ? 'order-time-recent' : ''}">
        ${sinceMin < 1 ? 'agora' : `${sinceMin} min`}
      </div>
      <div class="order-value">
        ${fmt(o.total)}
        <small>${o.payment}</small>
      </div>
    </div>
  `;
}

function openOrderModal(id) {
  modalOrderId = id;
  renderStage();
}

function closeOrderModal() {
  modalOrderId = null;
  renderStage();
}

function renderOrderModal() {
  const o = STATE.orders.find(x => x.id === modalOrderId);

  return `

            <small>Pedido</small>
            ${o.number}
          </div>

              </div>

          <div class="modal-section">
            <div class="modal-section-label">Checklist de separação</div>

              ${o.items.map((it, idx) => `
                <div class="check-item ${o.checked.includes(idx) ? 'checked' : ''}" onclick="toggleCheck('${o.id}', ${idx})">
                  <div class="check-box">✓</div>
                  <div class="check-item-info">
                    <b>${it.qty}× ${it.name}</b>
                    <p>${fmt(it.price)} cada</p>
                  </div>
                  <div style="font-weight:700;color:#B90032;">${fmt(it.qty * it.price)}</div>
                </div>
              `).join('')}

          </div>

          <div class="modal-section">
            <div class="modal-section-label">Pagamento</div>
            <div style="display:flex;justify-content:space-between;align-items:center;padding:12px;background:#F4F0EA;border-radius:12px;">
              <span style="font-weight:600">${o.payment}</span>
              <span style="font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;color:#B90032">${fmt(o.total)}</span>

}

function renderOrderActions(o) {
  if (o.status === 'received' || o.status === 'payment_confirmed') {
    return `
      <button class="btn-outline" onclick="closeOrderModal()">Voltar</button>
      <button class="btn-primary" onclick="advanceOrder('${o.id}')">Iniciar separação dos produtos</button>
    `;
  }
  if (o.status === 'preparing') {
    const allChecked = o.checked.length === o.items.length;
    return `
      <button class="btn-outline" onclick="closeOrderModal()">Voltar</button>
      <button class="btn-primary" ${!allChecked ? 'style="opacity:0.5;cursor:not-allowed"' : ''} onclick="${allChecked ? `advanceOrder('${o.id}')` : `toast('Aguarde','Marque todos os itens como separados','📦')`}">
        ${allChecked ? 'Pronto para coleta →' : `Itens separados (${o.checked.length}/${o.items.length})`}
      </button>
    `;
  }
  if (o.status === 'ready') {
    return `
      <button class="btn-outline" onclick="closeOrderModal()">Voltar</button>
      <button class="btn-gold btn-primary" onclick="dispatchOrder('${o.id}')">
        🛵 Despachar via Uber Direct
      </button>
    `;
  }
  if (o.status === 'in_delivery') {
    return `
      <button class="btn-outline" onclick="closeOrderModal()">Fechar</button>
      <button class="btn-primary" onclick="advanceOrder('${o.id}')">Marcar como entregue</button>
    `;
  }
  return `<button class="btn-outline btn-block" onclick="closeOrderModal()">Fechar</button>`;
}

function toggleCheck(orderId, idx) {
  const o = STATE.orders.find(x => x.id === orderId);
  if (!o) return;
  if (o.checked.includes(idx)) o.checked = o.checked.filter(i => i !== idx);
  else o.checked.push(idx);
  renderStage();
}

function advanceOrder(orderId) {
  const o = STATE.orders.find(x => x.id === orderId);
  if (!o) return;
  if (o.status === 'received' || o.status === 'payment_confirmed') {
    o.status = 'preparing';
    toast('Iniciada separação', `${o.number} sendo preparado`, '📦');
  } else if (o.status === 'preparing') {
    o.status = 'ready';
    toast('Pronto para coleta', `Acione o entregador para ${o.number}`, '✓');
  } else if (o.status === 'in_delivery') {
    o.status = 'delivered';
    toast('Entregue!', `${o.number} concluído`, '🎉');
  }
  renderStage();
}

function dispatchOrder(orderId) {
  const o = STATE.orders.find(x => x.id === orderId);
  if (!o) return;
  closeOrderModal();
  // Simula chamada à API Uber Direct: POST /deliveries
  toast('📡 Chamando Uber Direct...', `POST /deliveries enviado • aguardando entregador`, '🌐');

  // Em produção: a API responde imediatamente com delivery_id e status "pending"
  // Em segundos chega o primeiro webhook event.delivery_status = "pickup" com courier atribuído
  setTimeout(() => {
    const order = STATE.orders.find(x => x.id === orderId);
    if (!order) return;
    order.status = 'in_delivery';
    order.courier = { name: 'Lucas Ferreira', vehicle: 'Honda CG • CHV-2384', rating: 4.9 };
    STATE.activeOrderId = orderId;
    UberSim.start(orderId);
    toast('🛵 Entregador encontrado!', `Lucas F. (Uber Driver) está a caminho da franquia`, '✓');
    renderStage();
  }, 1500);
}

}

// Atualiza apenas o SVG do mapa + card de live location, sem re-renderizar a tela inteira
function updateTrackingMap() {
  const order = STATE.orders.find(o => o.id === STATE.activeOrderId);
  if (!order) return;

  // 1. Atualizar mapa SVG
  const mapContainer = document.querySelector('.map-container');
  if (mapContainer) {
    const oldSvg = mapContainer.querySelector('.map-svg');
    if (oldSvg) {
      const tempDiv = document.createElement('div');
      tempDiv.innerHTML = renderMap(order.status);
      const newSvg = tempDiv.querySelector('.map-svg');
      if (newSvg) oldSvg.replaceWith(newSvg);
    }
  }

  // 2. Atualizar ETA dinâmico
  const sim = UberSim.state;
  const etaEl = document.querySelector('.tracking-eta-value em');
  if (etaEl && order.status === 'in_delivery') {
    const minsLeft = Math.max(1, Math.ceil((1 - sim.routeProgress) * 18));
    etaEl.textContent = minsLeft + ' min';
  }

  // 3. Atualizar coords no toast do mapa
  const toastEl = document.getElementById('map-coords-toast');
  if (toastEl) {
    toastEl.textContent = `📡 lat ${sim.coords.lat.toFixed(5)}, lng ${sim.coords.lng.toFixed(5)}`;
  }

  // 4. Atualizar card de localização ao vivo
  const latEl = document.getElementById('live-loc-lat');
  if (latEl) latEl.textContent = sim.coords.lat.toFixed(6);

  const lngEl = document.getElementById('live-loc-lng');
  if (lngEl) lngEl.textContent = sim.coords.lng.toFixed(6);

  const distanceEl = document.getElementById('live-loc-distance');
  if (distanceEl) {
    const remainingDistance = haversineDistance(sim.coords, DROPOFF_COORDS);
    const formatted = fmtDistance(remainingDistance);
    const parts = formatted.split(' ');
    distanceEl.innerHTML = parts[0] + '<small>' + (parts[1] || '') + '</small>';
  }

  const progressEl = document.getElementById('live-loc-progress');
  if (progressEl) {
    progressEl.innerHTML = Math.round(sim.routeProgress * 100) + '<small>%</small>';
  }

  const barEl = document.getElementById('live-loc-bar');
  if (barEl) barEl.style.width = (sim.routeProgress * 100) + '%';

  const updateEl = document.getElementById('live-loc-update');
  if (updateEl) updateEl.textContent = fmtSecondsAgo(sim.webhooks[0]?.timestamp);

  const statusEl = document.getElementById('live-loc-status');
  const isArriving = sim.routeProgress > 0.85;
  if (statusEl) {
    statusEl.innerHTML = isArriving
      ? '<span class="arriving">⚡ Chegando!</span>'
      : 'Atualização contínua';
  }

  // 5. Habilitar botão "confirmar recebimento" quando estiver chegando
  const confirmBtn = document.getElementById('btn-confirm-receipt');
  if (confirmBtn) {
    if (isArriving) {
      confirmBtn.disabled = false;
      confirmBtn.querySelector('span:last-child').textContent = 'Confirmar recebimento';
    } else {
      confirmBtn.disabled = true;
      confirmBtn.querySelector('span:last-child').textContent = 'Aguardando entregador chegar...';
    }
  }
}
