  filter: drop-shadow(0 2px 8px rgba(212, 175, 96, 0.4));
}

.pull-indicator .pull-text {
  font-size: 9px;
  letter-spacing: 1px;
  color: var(--or);
  font-weight: 700;
  text-transform: uppercase;
  margin-top: 4px;
  opacity: 0;
  transition: opacity 0.2s;
  white-space: nowrap;
}

.pull-indicator.ready .pull-text {
  opacity: 1;
}

.pull-indicator.refreshing .pull-sun {
  animation: pullRefreshSpin 0.8s linear infinite;
}

.pull-indicator.refreshing .pull-text {
  opacity: 1;
}

.pull-indicator.refreshing .pull-text::after {
  content: 'Atualizando...';
}

.pull-indicator.refreshing .pull-text {
  font-size: 0;
}

.pull-indicator.refreshing .pull-text::after {
  font-size: 9px;
}

@keyframes pullRefreshSpin {
  to { transform: rotate(360deg); }
}

/* ================ FLOATING CART BAR ================ */
.floating-cart-bar {
  position: absolute;
  bottom: 88px;
  left: 16px;
  right: 16px;
  background: linear-gradient(135deg, var(--bordeaux-deep), var(--bordeaux));
  color: var(--blanc);
  border: none;
  border-radius: 20px;
  padding: 12px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  box-shadow: 0 10px 30px rgba(55, 0, 20, 0.5),
              0 4px 12px rgba(185, 0, 50, 0.25);
  z-index: 9;
  font-family: 'Manrope', sans-serif;

  /* Animação de entrada (de baixo pra cima com fade) */
  transform: translateY(120%) scale(0.92);
  opacity: 0;
  transition: transform 0.45s cubic-bezier(0.2, 1.2, 0.4, 1),
              opacity 0.3s,
              box-shadow 0.3s;

  /* Brilho dourado sutil */
  position: absolute;
}

.floating-cart-bar.visible {
  transform: translateY(0) scale(1);
  opacity: 1;
}

.floating-cart-bar:hover {
  box-shadow: 0 14px 36px rgba(55, 0, 20, 0.65),
              0 6px 18px rgba(185, 0, 50, 0.35);
  transform: translateY(-2px) scale(1);
}

.floating-cart-bar::before {
  content: '';
  position: absolute;
  top: 0; right: 0; bottom: 0;
  width: 80px;
  background: radial-gradient(circle at 100% 50%, rgba(212, 175, 96, 0.25), transparent 70%);
  pointer-events: none;
  border-radius: 20px;
}

.fcb-left {
  display: flex;
  align-items: center;
  gap: 12px;
  position: relative;
}

.fcb-count {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--or-light), var(--or));
  color: var(--bordeaux);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 14px;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(212, 175, 96, 0.4);
  animation: fcbCountPulse 0.4s ease-out;
}

@keyframes fcbCountPulse {
  0% { transform: scale(0.5); }
  60% { transform: scale(1.2); }
  100% { transform: scale(1); }
}

.fcb-text {
  text-align: left;
}

.fcb-title {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.3px;
  line-height: 1.1;
}

.fcb-subtitle {
  font-size: 10px;
  opacity: 0.7;
  margin-top: 2px;
  letter-spacing: 0.2px;
}

.fcb-right {
  display: flex;
  align-items: center;
  gap: 10px;
  position: relative;
}

.fcb-amount {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 22px;
  font-weight: 600;
  color: var(--or-light);
  line-height: 1;
}

.fcb-arrow {
  font-size: 18px;
  color: var(--or-light);
  font-weight: 700;
}

/* Badge no nav-item carrinho */
.nav-cart-ico {
  position: relative;
}

.nav-cart-badge {
  position: absolute;
  top: -4px;
  right: -6px;
  background: linear-gradient(135deg, var(--or-light), var(--or));
  color: var(--bordeaux);
  font-size: 9px;
  padding: 2px 5px;
  border-radius: 10px;
  font-weight: 800;
  min-width: 16px;
  text-align: center;
  box-shadow: 0 2px 6px rgba(212, 175, 96, 0.4);
  animation: badgePop 0.4s ease-out;
}

@keyframes badgePop {
  0% { transform: scale(0); }
  60% { transform: scale(1.3); }
  100% { transform: scale(1); }
}

/* Animação de "bump" no card quando produto é adicionado */
.product-card.bump {
  animation: cardBump 0.5s cubic-bezier(0.2, 1, 0.4, 1);
}

@keyframes cardBump {
  0% { transform: translateY(0) scale(1); }
  30% { transform: translateY(-6px) scale(1.03); box-shadow: 0 12px 30px rgba(185, 0, 50, 0.25); }
  100% { transform: translateY(0) scale(1); }
}

/* Quando o carrinho tem itens, dá padding extra no app-content para a floating bar não tampar conteúdo */
.app-content.has-floating-cart {
  padding-bottom: 180px;
}

/* ================================================================
   🎬 FRENTE 1 — SPLASH SCREEN CINEMATOGRÁFICO
   Aparece uma vez por sessão. Logo se desenha, sol nasce, fade.
   ================================================================ */

#splash-screen {
  position: fixed;
  inset: 0;
  z-index: 99999;
  background: linear-gradient(180deg, #1F0009 0%, #370014 50%, #5A0024 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  animation: splashFadeOut 0.8s ease-out 3.2s forwards;
}

@keyframes splashFadeOut {
  to { opacity: 0; visibility: hidden; pointer-events: none; }
}

.splash-stars {
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.8), transparent),
    radial-gradient(1px 1px at 60% 20%, rgba(244,220,160,0.6), transparent),
    radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.5), transparent),
    radial-gradient(1px 1px at 80% 50%, rgba(244,220,160,0.7), transparent),
    radial-gradient(1px 1px at 90% 80%, rgba(255,255,255,0.4), transparent),
    radial-gradient(1px 1px at 15% 80%, rgba(255,255,255,0.6), transparent),
    radial-gradient(1px 1px at 70% 90%, rgba(244,220,160,0.5), transparent);
  background-size: 200% 200%;
  animation: starsTwinkle 4s ease-in-out infinite;
  opacity: 0.4;
}

@keyframes starsTwinkle {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 0.7; }
}

.splash-sun-bg {
  position: absolute;
  bottom: -40%;
  left: 50%;
  transform: translateX(-50%);
  width: 600px;
  height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(244,220,160,0.4) 0%, rgba(170,130,50,0.15) 40%, transparent 70%);
  animation: splashSunRise 3.2s cubic-bezier(0.65, 0, 0.35, 1) forwards;
}

@keyframes splashSunRise {
  0% { transform: translateX(-50%) translateY(60%); opacity: 0; }
  30% { opacity: 1; }
  100% { transform: translateX(-50%) translateY(-30%); opacity: 1; }
}

.splash-content {
  position: relative;
  z-index: 2;
  text-align: center;
  animation: splashContentEnter 1s cubic-bezier(0.34, 1.56, 0.64, 1) 0.4s both;
}

@keyframes splashContentEnter {
  from { opacity: 0; transform: translateY(20px) scale(0.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.splash-logo-svg {
  width: 220px;
  height: auto;
  margin: 0 auto 24px;
  display: block;
  filter: drop-shadow(0 4px 24px rgba(244,220,160,0.4));
}

.splash-logo-svg .logo-stroke {
  fill: none;
  stroke: #F4DCA0;
  stroke-width: 1.2;
  stroke-linecap: round;
  stroke-linejoin: round;
  stroke-dasharray: 800;
  stroke-dashoffset: 800;
  animation: logoStroke 2s cubic-bezier(0.65, 0, 0.35, 1) 0.6s forwards;
}

.splash-logo-svg .logo-fill {
  fill: #F4DCA0;
  opacity: 0;
  animation: logoFill 0.8s ease-out 2.2s forwards;
}

@keyframes logoStroke {
  to { stroke-dashoffset: 0; }
}

@keyframes logoFill {
  to { opacity: 1; }
}

.splash-tagline {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 22px;
  color: #F4DCA0;
  letter-spacing: 1px;
  opacity: 0;
  animation: taglineFade 0.8s ease-out 2.4s forwards;
  margin-bottom: 8px;
}

@keyframes taglineFade {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 0.95; transform: translateY(0); }
}

.splash-product-name {
  font-family: 'Manrope', sans-serif;
  font-size: 28px;
  font-weight: 700;
  letter-spacing: 6px;
  color: #fff;
  text-transform: uppercase;
  opacity: 0;
  animation: productNameFade 0.8s ease-out 2.6s forwards;
}

@keyframes productNameFade {
  from { opacity: 0; letter-spacing: 12px; }
  to { opacity: 1; letter-spacing: 6px; }
}

.splash-loader {
  position: absolute;
  bottom: 60px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 6px;
  opacity: 0;
  animation: loaderFade 0.4s ease-out 2.8s forwards;
}

@keyframes loaderFade {
  to { opacity: 1; }
}

.splash-loader span {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #F4DCA0;
  animation: loaderPulse 1.2s ease-in-out infinite;
}
.splash-loader span:nth-child(2) { animation-delay: 0.15s; }
.splash-loader span:nth-child(3) { animation-delay: 0.30s; }

@keyframes loaderPulse {
  0%, 100% { opacity: 0.3; transform: scale(0.8); }
  50% { opacity: 1; transform: scale(1.2); }
}

/* Particles flutuantes (douradas) */
.splash-particles {
  position: absolute;
  inset: 0;
  overflow: hidden;
  pointer-events: none;
}

.splash-particle {
  position: absolute;
  width: 4px;
  height: 4px;
  background: radial-gradient(circle, rgba(244,220,160,0.8), transparent);
  border-radius: 50%;
  animation: particleFloat linear infinite;
}

@keyframes particleFloat {
  from {
    transform: translateY(110vh) translateX(0) scale(0);
    opacity: 0;
  }
  10% { opacity: 1; transform: translateY(95vh) translateX(0) scale(1); }
  90% { opacity: 1; }
  to {
    transform: translateY(-10vh) translateX(60px) scale(0);
    opacity: 0;
  }
}



/* ================================================================
   🎨 FRENTE 4 — SISTEMA VISUAL COESO (Apple-tier)
   Easings premium, sombras realistas, tipografia refinada
   ================================================================ */

:root {
  /* Easings da Apple (curvas que dão a sensação "premium") */
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-soft: cubic-bezier(0.65, 0, 0.35, 1);
  --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-in-out-quart: cubic-bezier(0.76, 0, 0.24, 1);
  --ease-emphasized: cubic-bezier(0.2, 0, 0, 1);

  /* Sombras em camadas (multi-shadow para profundidade real) */
  --shadow-elev-1:
    0 1px 2px rgba(55, 0, 20, 0.06),
    0 2px 4px rgba(55, 0, 20, 0.04);
  --shadow-elev-2:
    0 2px 4px rgba(55, 0, 20, 0.08),
    0 4px 12px rgba(55, 0, 20, 0.06),
    0 8px 24px rgba(55, 0, 20, 0.04);
  --shadow-elev-3:
    0 4px 8px rgba(55, 0, 20, 0.10),
    0 8px 24px rgba(55, 0, 20, 0.08),
    0 16px 48px rgba(55, 0, 20, 0.06);
  --shadow-elev-4:
    0 8px 16px rgba(55, 0, 20, 0.12),
    0 16px 48px rgba(55, 0, 20, 0.10),
    0 32px 80px rgba(55, 0, 20, 0.08);
  --shadow-glow-gold:
    0 0 20px rgba(244, 220, 160, 0.3),
    0 4px 16px rgba(170, 130, 50, 0.25);
  --shadow-inner-soft: inset 0 1px 2px rgba(255, 255, 255, 0.08);

  /* Bordas refinadas (em vez de bordas, usamos inset shadows) */
  --border-subtle: rgba(255, 255, 255, 0.08);
  --border-warm: rgba(170, 130, 50, 0.18);
  --border-rouge: rgba(185, 0, 50, 0.25);

  /* Glassmorphism */
  --glass-bg: rgba(20, 5, 12, 0.65);
  --glass-blur: 20px;
  --glass-border: 1px solid rgba(255, 255, 255, 0.08);
}

/* Global text rendering refinement */
html {
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

/* Tipografia mais refinada — kerning */
body, button, input, textarea {
  font-feature-settings: 'kern' 1, 'liga' 1, 'ss01' 1;
  -webkit-font-smoothing: antialiased;
}

/* Cormorant em pontos POÉTICOS apenas — usa onde tiver classe .poetic */
.poetic {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 400;
  letter-spacing: 0.5px;
}

/* Ruído sutil de fundo (tipo papel de parede premium) */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1;
  opacity: 0.025;
  background-image: url("data:image/svg+xml;utf8,<svg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/></svg>");
  mix-blend-mode: overlay;
}

/* No mobile, desativa o ruído pra não pesar a GPU */
@media (max-width: 600px) {
  body::after { display: none; }
}

/* Botões com depth premium — efeito de "afundar" */
button:not(.no-press),
.btn-primary,
.btn-secondary,
.btn-cta,
.btn-gold,
.product-card,
.cta-bar,
.fixed-bottom button,
.detail-cta-bar button,
[role="button"] {
  transition:
    transform 0.18s var(--ease-spring),
    box-shadow 0.25s var(--ease-soft),
    filter 0.2s var(--ease-soft);
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

button:not(.no-press):active,
.btn-primary:active,
.btn-secondary:active,
.btn-cta:active,
.btn-gold:active,
.fixed-bottom button:active,
.detail-cta-bar button:active,
[role="button"]:active {
  transform: scale(0.96);
  filter: brightness(0.95);
}

/* Card elevation — depth real */
.product-card {
  box-shadow: var(--shadow-elev-2);
  transition:
    transform 0.3s var(--ease-spring),
    box-shadow 0.3s var(--ease-soft);
}

.product-card:hover {
  box-shadow: var(--shadow-elev-3);
  transform: translateY(-2px);
}

.product-card:active {
  transform: translateY(0) scale(0.98);
  box-shadow: var(--shadow-elev-1);
}

/* Inputs refinados */
input, textarea {
  transition:
    border-color 0.2s var(--ease-soft),
    box-shadow 0.2s var(--ease-soft),
    background 0.2s var(--ease-soft);
}

input:focus, textarea:focus {
  outline: none;
  box-shadow:
    0 0 0 3px rgba(244, 220, 160, 0.15),
    var(--shadow-elev-1);
}

/* Scrollbar refinada (quando aparecer) */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb {
  background: rgba(244, 220, 160, 0.2);
  border-radius: 3px;
  transition: background 0.2s;
}
::-webkit-scrollbar-thumb:hover { background: rgba(244, 220, 160, 0.4); }

/* Selection */
::selection {
  background: rgba(244, 220, 160, 0.35);
  color: #1F0009;
}

/* Focus visible — accessibility refinada */
:focus-visible {
  outline: 2px solid rgba(244, 220, 160, 0.6);
  outline-offset: 3px;
  border-radius: 8px;
}

/* Imagens carregando — fade-in suave */
img {
  transition: opacity 0.4s var(--ease-soft);
}

img:not([src]),
img[src=""] {
  opacity: 0;
}

/* Sublinhado refinado (animado) */
a, .link {
  position: relative;
  text-decoration: none;
  background-image: linear-gradient(currentColor, currentColor);
  background-size: 0% 1px;
  background-position: 0% 100%;
  background-repeat: no-repeat;
  transition: background-size 0.3s var(--ease-soft);
}

a:hover, .link:hover {
  background-size: 100% 1px;
}

/* Loading skeleton dourado (em vez de spinner padrão) */
.skeleton {
  background: linear-gradient(
    90deg,
    rgba(244, 220, 160, 0.05) 0%,
    rgba(244, 220, 160, 0.15) 50%,
    rgba(244, 220, 160, 0.05) 100%
  );
  background-size: 200% 100%;
  animation: skeletonShimmer 1.6s ease-in-out infinite;
  border-radius: 8px;
}

@keyframes skeletonShimmer {
  from { background-position: 200% 0; }
  to { background-position: -200% 0; }
}

/* Toast refinado (tipo Stripe) */
.toast {
  backdrop-filter: blur(var(--glass-blur));
  -webkit-backdrop-filter: blur(var(--glass-blur));
  box-shadow: var(--shadow-elev-3) !important;
  border: var(--glass-border);
}

/* Active state nos product-cards — micro-bounce */
.product-card .product-img {
  transition: transform 0.5s var(--ease-spring);
}

.product-card:hover .product-img {
  transform: scale(1.04) rotate(-1deg);
}

/* Preço com tabular-nums (alinhamento perfeito) */
.product-price, .price, .total, [data-price] {
  font-variant-numeric: tabular-nums;
  font-feature-settings: 'tnum' 1;
}

/* Smooth corners em mobile (iOS safe area) */
@supports (padding: max(0px)) {
  body {
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }
}

/* Prefers reduced motion — accessibility (versão corrigida)
   IMPORTANTE: animation-iteration-count: 1 impede loops infinitos.
   Sem isso, animações com duração 0.01ms + iteration: infinite
   rodam 100.000x/seg e geram efeito de piscando frenético no mobile. */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important; /* CRUCIAL — para loops infinitos */
    transition-duration: 0.01ms !important;
    scroll-behavior: auto !important;
  }
  /* Splash com tempo razoável pra mostrar a marca, mesmo com reduce-motion */
  #splash-screen {
    animation: splashFadeOut 0.6s ease-out 1.8s forwards !important;
  }
  #splash-screen .splash-logo-svg .logo-stroke {
    animation: logoStroke 1s ease-out 0.2s forwards !important;
  }
  #splash-screen .splash-logo-svg .logo-fill {
    animation: logoFill 0.4s ease-out 1.2s forwards !important;
  }
  #splash-screen .splash-tagline {
    animation: taglineFade 0.4s ease-out 1.0s forwards !important;
  }
  #splash-screen .splash-product-name {
    animation: productNameFade 0.4s ease-out 1.2s forwards !important;
  }
  #splash-screen .splash-loader {
    animation: loaderFade 0.3s ease-out 1.4s forwards !important;
  }
  #splash-screen .splash-content {
    animation: splashContentEnter 0.5s ease-out 0.2s both !important;
  }
  #splash-screen .splash-sun-bg {
    animation: splashSunRise 1.8s ease-out forwards !important;
  }
}



/* ================================================================
   🎬 FRENTE 2 — MICRO-INTERAÇÕES PREMIUM
   Haptics em cascata, transições refinadas, gestos
   ================================================================ */

/* Transições entre telas (slide tipo iOS) */
/* stageEnter aplicado SÓ em elementos com .fade-enter (que já existe no app)
   Antes: rodava em TODO re-render, causando piscar quando clicava em +/- no carrinho */
.stage > .fade-enter {
  animation: stageEnter 0.35s var(--ease-out-expo);
}

@keyframes stageEnter {
  from {
    opacity: 0;
    transform: translateY(6px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* No mobile, mais rápido pra não dar sensação de lag */
@media (max-width: 600px) {
  .stage > .fade-enter {
    animation-duration: 0.2s;
  }
}

/* Bottom nav com ícones que "respiram" */
.bottom-nav button,
.nav-btn,
[class*="nav-item"] {
  transition: all 0.3s var(--ease-spring);
  position: relative;
}

/* navItemBreath REMOVIDO — o indicador dourado deslizante já dá feedback visual suficiente
   sem precisar pulsar o botão inteiro (causava sensação de "piscando" no mobile) */
.bottom-nav button.active,
.nav-btn.active,
[class*="nav-item"].active {
  /* sem animação infinita — só feedback de cor do CSS já existente */
}

/* Indicador ativo do nav (linha dourada que desliza) */
.bottom-nav button::after,
.nav-btn::after {
  content: '';
  position: absolute;
  bottom: 4px;
  left: 50%;
  width: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--or-shimmer), var(--or-light));
  border-radius: 2px;
  transform: translateX(-50%);
  transition: width 0.4s var(--ease-spring);
}

.bottom-nav button.active::after,
.nav-btn.active::after {
  width: 24px;
}

/* Cards aparecendo em cascata */
.product-card {
  animation: cardCascadeIn 0.5s var(--ease-out-expo) backwards;
}

.product-grid .product-card:nth-child(1) { animation-delay: 0.04s; }
.product-grid .product-card:nth-child(2) { animation-delay: 0.08s; }
.product-grid .product-card:nth-child(3) { animation-delay: 0.12s; }
.product-grid .product-card:nth-child(4) { animation-delay: 0.16s; }
.product-grid .product-card:nth-child(5) { animation-delay: 0.20s; }
.product-grid .product-card:nth-child(6) { animation-delay: 0.24s; }
.product-grid .product-card:nth-child(7) { animation-delay: 0.28s; }
.product-grid .product-card:nth-child(8) { animation-delay: 0.32s; }
/* No mobile, cards não cascateiam (entram juntos) pra não dar sensação de "lerdo" */
@media (max-width: 600px) {
  .product-grid .product-card { animation-delay: 0s !important; }
}

@keyframes cardCascadeIn {
  from {
    opacity: 0;
    transform: translateY(20px) scale(0.95);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

/* Botões CTA com shimmer (brilho passando) */
.btn-cta,
.btn-gold,
.cta-bar button[onclick*="checkout"],
.fixed-bottom button,
.detail-cta-bar button[onclick*="checkout"],
button.btn-primary {
  position: relative;
  overflow: hidden;
}

.btn-cta::before,
.btn-gold::before,
.cta-bar button[onclick*="checkout"]::before,
.fixed-bottom button::before,
.detail-cta-bar button[onclick*="checkout"]::before,
button.btn-primary::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(
    90deg,
    transparent 0%,
    rgba(255, 255, 255, 0.2) 50%,
    transparent 100%
  );
  transition: left 0.7s var(--ease-out-expo);
  pointer-events: none;
}

.btn-cta:hover::before,
.btn-gold:hover::before,
.cta-bar button[onclick*="checkout"]:hover::before,
.fixed-bottom button:hover::before,
.detail-cta-bar button[onclick*="checkout"]:hover::before,
button.btn-primary:hover::before {
  left: 100%;
}

/* Modal entrance refinada */
.modal,
[class*="modal"],
.hinode-pay-modal {
  animation: modalEnter 0.4s var(--ease-out-expo);
}

@keyframes modalEnter {
  from {
    opacity: 0;
    transform: scale(0.95) translateY(8px);
  }
  to {
    opacity: 1;
    transform: scale(1) translateY(0);
  }
}

/* Floating cart bar — entrada acolchoada */
.fixed-bottom {
  animation: floatBarSlideUp 0.5s var(--ease-spring) backwards;
}

@keyframes floatBarSlideUp {
  from {
    opacity: 0;
    transform: translateY(40px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Toast com slide refinado (em vez de fade) */
.toast {
  animation: toastSlideIn 0.4s var(--ease-spring) !important;
}

@keyframes toastSlideIn {
  from {
    opacity: 0;
    transform: translateY(-20px) scale(0.95);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

/* Quantity badge bounce premium */
.qty-badge {
  animation: qtyBouncePremium 0.5s var(--ease-spring) !important;
}

@keyframes qtyBouncePremium {
  0% { transform: scale(0) rotate(-180deg); opacity: 0; }
  60% { transform: scale(1.3) rotate(0deg); opacity: 1; }
  100% { transform: scale(1) rotate(0deg); opacity: 1; }
}

/* Categoria-pill (filtros) — toggle premium */
.category-pill,
.filter-pill,
[class*="chip"]:not([class*="chip-product"]) {
  transition: all 0.25s var(--ease-spring);
  cursor: pointer;
}

.category-pill:active,
.filter-pill:active {
  transform: scale(0.92);
}

.category-pill.active,
.filter-pill.active {
  animation: pillActivate 0.4s var(--ease-spring);
}

@keyframes pillActivate {
  0% { transform: scale(1); }
  50% { transform: scale(1.08); }
  100% { transform: scale(1); }
}

/* Search bar — ícone que pulsa quando vazio */
input[type="search"] + .search-icon,
.search-bar input + svg,
.search-input + .icon {
  transition: opacity 0.3s, transform 0.3s var(--ease-spring);
}

input[type="search"]:focus + .search-icon,
.search-bar input:focus + svg {
  transform: scale(1.1);
  color: var(--or-shimmer);
}

/* Title slide-in — desativado no mobile pra não ficar repetindo */
@media (min-width: 601px) {
  .product-detail h1,
  .product-detail-title,
  .detail-title {
    animation: titleSlideIn 0.6s var(--ease-out-expo) 0.1s backwards;
  }
}

@keyframes titleSlideIn {
  from {
    opacity: 0;
    transform: translateY(12px);
    letter-spacing: 4px;
  }
  to {
    opacity: 1;
    transform: translateY(0);
    letter-spacing: normal;
  }
}

/* Imagem do produto — zoom suave on hover */
.product-detail-image,
.detail-image {
  transition: transform 0.6s var(--ease-soft);
}

.product-detail-image:hover,
.detail-image:hover {
  transform: scale(1.03);
}

/* Pull-to-refresh hint */
.pull-refresh-hint {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 60px;
  margin-top: -60px;
  opacity: 0.5;
  font-size: 12px;
  color: var(--or-light);
  letter-spacing: 1px;
}

/* Stepper +/- buttons com bounce */
.qty-stepper button,
.stepper-btn {
  transition: all 0.2s var(--ease-spring);
}

.qty-stepper button:active,
.stepper-btn:active {
  transform: scale(0.85);
  background: rgba(244, 220, 160, 0.15);
}

/* Glassmorphism nas barras flutuantes */
.fixed-bottom,
.floating-cart-bar,
.bottom-nav,
.detail-cta-bar {
  backdrop-filter: blur(var(--glass-blur)) saturate(1.4);
  -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(1.4);
}

/* screenSlideIn DESATIVADO — duplicava o fade-enter e causava double-flash.
   O .fade-enter já existe no app original e cuida das transições. */

/* subtleGlow REMOVIDO — no mobile a sombra pulsando ficava chamativa demais */
.eta-banner,
.franchise-bar {
  box-shadow: var(--shadow-elev-2);
}

/* Star rating — preenche elegantemente */
.stars,
.rating-stars {
  display: inline-flex;
  gap: 2px;
}

.star-filled {
  color: var(--or-shimmer);
  filter: drop-shadow(0 0 4px rgba(244, 220, 160, 0.4));
}

/* Avatar / motoboy — pulse warm */
.driver-avatar,
.courier-photo {
  position: relative;
}

.driver-avatar::after,
.courier-photo::after {
  content: '';
  position: absolute;
  inset: -3px;
  border-radius: 50%;
  border: 2px solid var(--or-shimmer);
  opacity: 0;
  animation: avatarPulse 2s ease-in-out infinite;
}

@keyframes avatarPulse {
  0%, 100% { opacity: 0; transform: scale(1); }
  50% { opacity: 0.6; transform: scale(1.1); }
}



/* ================================================================
   🌟 FRENTE 3 — EASTER EGGS SENSORIAIS
   Partículas de aroma, ripple, feedback amplificado
   ================================================================ */

/* Ripple effect — efeito de onda nos cliques (Material 3 + iOS feel) */
.ripple-container {
  position: relative;
  overflow: hidden;
}

.ripple {
  position: absolute;
  border-radius: 50%;
  background: rgba(244, 220, 160, 0.4);
  pointer-events: none;
  transform: translate(-50%, -50%) scale(0);
  animation: rippleExpand 0.6s var(--ease-out-expo) forwards;
}

@keyframes rippleExpand {
  to {
    transform: translate(-50%, -50%) scale(4);
    opacity: 0;
  }
}

/* Aroma particles (saem do produto na ficha) */
.aroma-container {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
}

.aroma-particle {
  position: absolute;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(244, 220, 160, 0.6), transparent);
  filter: blur(2px);
  animation: aromaRise 4s ease-out forwards;
  pointer-events: none;
}

@keyframes aromaRise {
  0% {
    opacity: 0;
    transform: translateY(0) translateX(0) scale(0.3);
  }
  20% {
    opacity: 0.8;
    transform: translateY(-30px) translateX(0) scale(1);
  }
  100% {
    opacity: 0;
    transform: translateY(-200px) translateX(var(--drift, 30px)) scale(2.5);
  }
}

/* Botão de "favoritar" coração que pulsa quando clicado */
.fav-btn,
.heart-btn,
.favorite-toggle {
  transition: transform 0.3s var(--ease-spring);
  cursor: pointer;
}

.fav-btn.active,
.heart-btn.active,
.favorite-toggle.active {
  animation: heartBeat 0.8s ease-in-out;
  color: var(--rouge);
}

@keyframes heartBeat {
  0% { transform: scale(1); }
  20% { transform: scale(1.4); }
  40% { transform: scale(0.9); }
  60% { transform: scale(1.2); }
  100% { transform: scale(1); }
}

/* bottleSubtleRotate REMOVIDO — no mobile a rotação infinita do produto incomoda */
.product-detail-image,
.detail-product-image,
.perfume-bottle-3d {
  transform-style: preserve-3d;
  perspective: 1000px;
}

/* ambientGlow estático — sem animação infinita */
.product-detail-image::before,
.detail-product-image::before {
  content: '';
  position: absolute;
  inset: -20%;
  background: radial-gradient(circle, rgba(244, 220, 160, 0.12) 0%, transparent 60%);
  z-index: -1;
  opacity: 0.5;
}

/* Cart bag swing quando adiciona */
.cart-icon-wrapper.has-items {
  animation: cartSwing 0.7s var(--ease-spring);
}

@keyframes cartSwing {
  0%, 100% { transform: rotate(0deg); }
  20% { transform: rotate(-15deg); }
  40% { transform: rotate(10deg); }
  60% { transform: rotate(-5deg); }
  80% { transform: rotate(2deg); }
}

/* Status timeline com pontos vivos (estilo Stripe) */
.timeline-dot {
  position: relative;
}

.timeline-dot.active::before {
  content: '';
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  background: rgba(244, 220, 160, 0.4);
  animation: dotPulseLive 1.6s ease-in-out infinite;
  z-index: -1;
}

@keyframes dotPulseLive {
  0%, 100% { transform: scale(1); opacity: 0.6; }
  50% { transform: scale(1.5); opacity: 0; }
}

/* Price tag ao chegar no produto — slide-in dramatic */
.product-price-detail,
.detail-price {
  display: inline-block;
  animation: priceReveal 0.8s var(--ease-spring) 0.3s backwards;
}

@keyframes priceReveal {
  from {
    opacity: 0;
    transform: scale(0.5) rotate(-5deg);
  }
  to {
    opacity: 1;
    transform: scale(1) rotate(0deg);
  }
}

/* Mini sparkles ao adicionar item */
.sparkle-burst {
  position: absolute;
  pointer-events: none;
  width: 100px;
  height: 100px;
  z-index: 99;
}

.sparkle-burst .sparkle {
  position: absolute;
  width: 4px;
  height: 4px;
  background: var(--or-shimmer);
  border-radius: 50%;
  box-shadow: 0 0 6px rgba(244, 220, 160, 0.8);
  animation: sparkleBurst 0.8s ease-out forwards;
}

@keyframes sparkleBurst {
  0% {
    opacity: 1;
    transform: translate(0, 0) scale(0);
  }
  50% {
    opacity: 1;
    transform: translate(var(--tx, 30px), var(--ty, -30px)) scale(1);
  }
  100% {
    opacity: 0;
    transform: translate(var(--tx2, 60px), var(--ty2, -60px)) scale(0);
  }
}

/* Empty state ilustrativo */
.empty-state {
  text-align: center;
  padding: 60px 24px;
  opacity: 0;
  animation: emptyStateFade 0.8s var(--ease-out-expo) 0.2s forwards;
}

@keyframes emptyStateFade {
  to { opacity: 1; }
}

.empty-state-icon {
  font-size: 64px;
  margin-bottom: 16px;
  display: inline-block;
  animation: iconFloatGentle 3s ease-in-out infinite;
}

@keyframes iconFloatGentle {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

/* Headers grandes — entrada poética */
h1.poetic, h2.poetic, .hero-title {
  display: inline-block;
  animation: poeticEntry 1s var(--ease-out-expo) 0.2s backwards;
}

@keyframes poeticEntry {
  from {
    opacity: 0;
    transform: translateY(8px);
    filter: blur(4px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
    filter: blur(0);
  }
}

/* Background estrelado sutil em telas escuras */
.dark-bg-stars {
  position: relative;
}

.dark-bg-stars::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(1px 1px at 25% 30%, rgba(244,220,160,0.3), transparent),
    radial-gradient(1px 1px at 70% 60%, rgba(255,255,255,0.2), transparent),
    radial-gradient(1px 1px at 40% 80%, rgba(244,220,160,0.4), transparent);
  pointer-events: none;
  opacity: 0.4;
}

/* Confetti dourado — partículas físicas (3D feel) */
.confetti-particle {
  will-change: transform;
}

/* Hint de scroll suave no produto */
.scroll-hint {
  position: absolute;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 11px;
  color: rgba(244, 220, 160, 0.6);
  letter-spacing: 2px;
  text-transform: uppercase;
  animation: scrollHintBob 2s ease-in-out infinite;
  pointer-events: none;
}

@keyframes scrollHintBob {
  0%, 100% { opacity: 0.4; transform: translateX(-50%) translateY(0); }
  50% { opacity: 0.8; transform: translateX(-50%) translateY(-4px); }
}




/* ================================================================
   📱 MODO STANDALONE (PWA INSTALADO)
   Quando o app está rodando como PWA (não no navegador)
   ================================================================ */

/* HTML/Body ocupando 100% da tela */
html, body {
  height: 100%;
  height: 100dvh;
  overflow-x: hidden;
}

/* Container do app respeita safe-areas (notch, home indicator, dynamic island) */
#app {
  min-height: 100vh;
  min-height: 100dvh;
  padding-top: env(safe-area-inset-top, 0);
  padding-bottom: env(safe-area-inset-bottom, 0);
  padding-left: env(safe-area-inset-left, 0);
  padding-right: env(safe-area-inset-right, 0);
}

/* Em modo standalone (PWA aberto da home), ainda mais imersivo */
@media all and (display-mode: standalone),
       all and (display-mode: fullscreen) {
  /* Esconde o banner de instalação se está rodando como PWA */
  #pwa-install-banner { display: none !important; }
  
  /* Garante que o app preencha tudo */
  body {
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
  }
  
  #app {
    height: 100vh;
    height: 100dvh;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
  }
  
  /* No iOS, status bar fica em cima do app (translucent), 
     então o conteúdo precisa de padding extra */
  .stage,
  .app-content {
    padding-top: max(env(safe-area-inset-top), 8px);
  }
  
  /* Fixed bottom respeita home indicator do iPhone */
  .fixed-bottom,
  .floating-cart-bar,
  .bottom-nav,
  .detail-cta-bar {
    padding-bottom: max(env(safe-area-inset-bottom), 12px) !important;
  }
}

/* iOS specific tweaks */
@supports (-webkit-touch-callout: none) {
  /* Disable text selection in app UI elements */
  button, .btn-primary, .btn-secondary, .product-card, 
  .nav-btn, .bottom-nav button, [role="button"] {
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }
}

// Estoque por franquia: gerado dinamicamente baseado no ID (reproducível)
// Em produção: GET /franchises/:id/stock retorna estoque real da franquia
const STOCK_BY_FRANCHISE = (() => {
  const stockMap = {};
  const productIds = ['p1', 'p2', 'p3', 'p4', 'p5', 'p6', 'p7', 'p8'];
  // Gerador determinístico simples baseado em hash do ID
  const hash = (str) => {
    let h = 0;
    for (let i = 0; i < str.length; i++) {
      h = ((h << 5) - h) + str.charCodeAt(i);
      h |= 0;
    }
    return Math.abs(h);
  };
  FRANCHISES.forEach((f) => {
    const stock = {};
    productIds.forEach((pid) => {
      const seed = hash(f.id + pid);
      stock[pid] = seed % 35; // 0-34, distribuição variada
    });
    stockMap[f.id] = stock;
  });
  return stockMap;
})();

/* ===================================================================
   🟢 STATUS ONLINE — Sistema iFood-style pras franquias
   Determina se cada franquia está ABERTA / FECHANDO EM BREVE / FECHADA
   baseado no horário atual e no campo `hours` da franquia.
   =================================================================== */

const _DAY_KEYS = ['sun', 'mon', 'tue', 'wed', 'thu', 'fri', 'sat'];
const _DAY_LABELS_PT = {
  mon: 'Segunda', tue: 'Terça', wed: 'Quarta',
  thu: 'Quinta', fri: 'Sexta', sat: 'Sábado', sun: 'Domingo'
};
const _DAY_SHORT_PT = {
  mon: 'Seg', tue: 'Ter', wed: 'Qua',
  thu: 'Qui', fri: 'Sex', sat: 'Sáb', sun: 'Dom'
};

/**
 * Retorna { state: 'open'|'closing'|'closed', label, detail }
 */
function getFranchiseStatus(franchise, date) {
  date = date || new Date();
  const dayIdx = date.getDay();
  const dayKey = _DAY_KEYS[dayIdx];
  const currMin = date.getHours() * 60 + date.getMinutes();
  const hours = (franchise.hours || {})[dayKey];

  if (!hours) {
    const next = _nextOpenDay(franchise, dayIdx);
    return {
      state: 'closed',
      label: 'Fechada',
      detail: next ? `Abre ${next.label} às ${next.time}` : 'Sem previsão'
    };
  }

  const [oh, om, ch, cm] = hours;
  const openMin = oh * 60 + om;
  const closeMin = ch * 60 + cm;

  if (currMin < openMin) {
    const mins = openMin - currMin;
    return {
      state: 'closed',
      label: 'Fechada',
      detail: `Abre hoje às ${_fmtHM(oh, om)} (em ${_fmtDur(mins)})`
    };
  }

  if (currMin >= closeMin) {
    const next = _nextOpenDay(franchise, dayIdx);
    return {
      state: 'closed',
      label: 'Fechada',
      detail: next ? `Abre ${next.label} às ${next.time}` : 'Sem previsão'
    };
  }

  const minsToClose = closeMin - currMin;
  if (minsToClose <= 30) {
    return {
      state: 'closing',
      label: `Fecha em ${_fmtDur(minsToClose)}`,
      detail: `Última hora — fecha às ${_fmtHM(ch, cm)}`
    };
  }

  return {
    state: 'open',
    label: 'Aberta agora',
    detail: `Fecha às ${_fmtHM(ch, cm)}`
  };
}

function _nextOpenDay(franchise, fromDayIdx) {
  for (let i = 1; i <= 7; i++) {
    const idx = (fromDayIdx + i) % 7;
    const key = _DAY_KEYS[idx];
    const h = (franchise.hours || {})[key];
    if (h) {
      const [oh, om] = h;
      const label = i === 1 ? 'amanhã' : _DAY_LABELS_PT[key].toLowerCase();
      return { label, time: _fmtHM(oh, om) };
    }
  }
  return null;
}

function _fmtHM(h, m) {
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

function _fmtDur(mins) {
  if (mins < 60) return `${mins}min`;
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  return m ? `${h}h${String(m).padStart(2,'0')}` : `${h}h`;
}

/**
 * Renderiza o badge HTML de status (com bolinha pulsante + label)
 */
function renderStatusBadge(franchise, opts) {
  opts = opts || {};
  const s = getFranchiseStatus(franchise);
  const showLabel = opts.label !== false;
  return `<span class="hd-status hd-status-${s.state}" title="${s.detail}">
    <span class="hd-status-dot"></span>${showLabel ? `<span class="hd-status-text">${s.label}</span>` : ''}
  </span>`;
}

   =================================================================== */

function callFranchise(franchiseId) {
  const f = FRANCHISES.find(x => x.id === franchiseId);
  if (!f || !f.phone) {
    toast('Telefone indisponível', 'Esta franquia não tem telefone cadastrado.', '☎️');
    return;
  }
  const clean = f.phone.replace(/\D/g, '');
  window.location.href = `tel:+55${clean}`;
  toast('Ligando…', `${f.name}`, '📞');
}

function whatsappFranchise(franchiseId) {
  const f = FRANCHISES.find(x => x.id === franchiseId);
  if (!f || !f.whatsapp) {
    toast('WhatsApp indisponível', 'Esta franquia não tem WhatsApp cadastrado.', '💬');
    return;
  }
  const msg = `Olá! Estou no aplicativo *Hinode Express* e queria saber sobre os produtos da ${f.name}. Pode me ajudar? 🌹`;
  const url = `https://wa.me/${f.whatsapp}?text=${encodeURIComponent(msg)}`;
  window.open(url, '_blank');
  toast('Abrindo WhatsApp', `${f.name}`, '💬');
}

function openFranchiseInMaps(franchiseId) {
  const f = FRANCHISES.find(x => x.id === franchiseId);
  if (!f) return;
  const query = encodeURIComponent(
    `${f.street}, ${f.number}, ${f.bairro}, ${f.city}, ${f.uf}, Brasil`
  );
  window.open(`https://www.google.com/maps/search/?api=1&query=${query}`, '_blank');
  toast('Abrindo Maps', `Rota até ${f.name}`, '🗺️');
}

function closeFranchiseDetails(e) {
  if (e && e.target.classList && !e.target.classList.contains('hd-modal-backdrop')) return;
  const container = document.getElementById('hd-modal-container');
  if (!container) return;
  container.querySelector('.hd-modal-backdrop').classList.remove('hd-modal-visible');
  document.body.style.overflow = '';

// 🎬 Splash cinematográfico — só na primeira carga da sessão
(function setupSplash() {
  const splash = document.getElementById('splash-screen');
  if (!splash) return;
  
  // Se já viu o splash nesta sessão, pula a animação
  let alreadySeen = false;
  try {
    alreadySeen = sessionStorage.getItem('hinode-splash-seen') === '1';
  } catch (e) { /* sessionStorage pode não estar disponível */ }
  
  if (alreadySeen) {
    splash.remove();
    return;
  }
  
  // Marca que já viu (pra próximas navegações)
  try { sessionStorage.setItem('hinode-splash-seen', '1'); } catch (e) {}
  
  // Gera partículas douradas
  const splashParticles = document.getElementById('splash-particles');
  if (splashParticles) {
    for (let i = 0; i < 18; i++) {
      const p = document.createElement('div');
      p.className = 'splash-particle';
      p.style.left = (Math.random() * 100) + '%';
      p.style.animationDuration = (4 + Math.random() * 4) + 's';
      p.style.animationDelay = (Math.random() * 3) + 's';
      p.style.opacity = (0.4 + Math.random() * 0.6).toString();
      splashParticles.appendChild(p);
    }
  }
  
  // Permite pular o splash com clique/toque
  splash.addEventListener('click', () => {
    splash.style.transition = 'opacity 0.3s ease-out';
    splash.style.opacity = '0';
    setTimeout(() => splash.remove(), 300);
  });
  
  // Remove automaticamente após a animação completar
  // Detecta se reduce-motion está ativo pra ajustar tempo
  const reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const removeDelay = reduceMotion ? 2600 : 4200; // Mais curto se reduce-motion, ainda mostra a marca
  setTimeout(() => {
    if (splash.parentNode) splash.remove();
  }, removeDelay);
})();


render();
}

function renderWebhookEvent(wh) {
  const isStatus = wh.type === 'delivery_status';
  const isDelivered = isStatus && wh.payload.status === 'delivered';
  const cls = isDelivered ? 'delivered' : (isStatus ? 'status' : 'location');

  // Formatação JSON colorida (compacta)
  const compact = compactPayload(wh.payload);

  return `
    <div class="webhook-event ${cls}">
      <div class="webhook-head">
        <span class="webhook-type">${wh.payload.kind}</span>
        <span class="webhook-time">${wh.time}</span>
      </div>
      <div class="webhook-body">${syntaxHighlight(compact)}</div>
    </div>
  `;
}

// Compacta payload pra mostrar campos essenciais
function compactPayload(p) {
  if (p.kind === 'event.courier_update') {
    return {
      kind: p.kind,
      delivery_id: p.delivery_id,
      data: {
        status: p.data.status,
        courier_imminent: p.data.courier_imminent,
        courier: {
          name: p.data.courier.name,
          location: p.data.courier.location
        }
      }
    };
  }
  if (p.kind === 'event.delivery_status') {
    return {
      kind: p.kind,
      status: p.status,
      delivery_id: p.delivery_id,
      created: p.created
    };
  }
  return p;
}

// Syntax highlight de JSON
function syntaxHighlight(obj) {
  let json = JSON.stringify(obj, null, 2);
  json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function (match) {
    let cls = 'num';
    if (/^"/.test(match)) {
      if (/:$/.test(match)) cls = 'key';
      else cls = 'str';
    } else if (/true|false/.test(match)) cls = 'bool';
    else if (/null/.test(match)) cls = 'bool';
    return '<span class="' + cls + '">' + match + '</span>';
  });
}

            <label class="onb2-label">
              <span>Ponto de referência</span>
              <span class="onb2-help" style="font-style:italic;">opcional</span>
            </label>
            <input type="text"
                   class="onb2-input"
                   placeholder="Ex: próximo à padaria"
                   value="${onbState.reference}"
                   oninput="onbState.reference = this.value;" />
          </div>
        ` : ''}

        <!-- Mensagem se está fora da cobertura -->
        ${onbState.outOfCoverage ? `
          <div class="onb2-out-coverage fadeInDown">
            <div class="onb2-oc-icon">🌅</div>
            <div class="onb2-oc-content">
              <b>Em breve no seu bairro</b>
              <p>Ainda não atendemos com entrega expressa em <b>${onbState.city}/${onbState.uf}</b>. Estamos expandindo rapidamente — cadastre seu CEP e te avisaremos!</p>
              ${onbState.nearestFranchiseDistance ? `<small>Franquia mais próxima a ${onbState.nearestFranchiseDistance.toFixed(0)} km</small>` : ''}
            </div>
          </div>
        ` : ''}

        <!-- Botão continuar (só ativa quando tudo pronto) -->
        ${onbState.cepFound ? `
          <button class="onb2-cta fadeInDown"
                  style="animation-delay:0.3s;${onbState.outOfCoverage ? 'background:linear-gradient(135deg, #6B6258, #888);' : ''}"
                  ${onbState.formValid && onbState.franchiseFound ? '' : 'disabled'}
                  onclick="onbProceedToHome()">
            ${getOnbCtaText()}
          </button>
        ` : ''}

        <div class="onb2-trust">
          <span>🔒</span>
          <span>Seu CEP é usado apenas para encontrar a franquia mais próxima</span>
        </div>
      </div>
    </div>
  `;
}

// Renderiza os 3 ícones de pipeline (rodando em paralelo)
function renderOnbPipeline() {
  const steps = [
    {
      icon: '📮',
      label: 'CEP',
      done: onbState.cepFound,
      loading: onbState.cepLoading
    },
    {
      icon: '🏪',
      label: 'Franquia',
      done: onbState.franchiseFound,
      loading: onbState.franchiseLoading
    },
    {
      icon: '📦',
      label: 'Estoque',
      done: onbState.stockFound,
      loading: onbState.stockLoading
    }
  ];

  return steps.map(s => `
    <div class="onb2-step ${s.done ? 'done' : (s.loading ? 'loading' : 'idle')}">
      <div class="onb2-step-ico">
        ${s.loading ? '<div class="onb2-spinner-sm"></div>' : (s.done ? '✓' : s.icon)}
      </div>
      <div class="onb2-step-label">${s.label}</div>
    </div>
  `).join('<div class="onb2-step-line"></div>');
}

function getOnbCtaText() {
  if (onbState.outOfCoverage) return 'Sua região ainda não atende';
  if (!onbState.formValid) return 'Informe o número';
  if (onbState.franchiseLoading || onbState.stockLoading) return 'Aguarde, carregando...';
  if (!onbState.franchiseFound) return 'Aguardando franquia...';
  return `Ver produtos disponíveis →`;
}

// Handler do input de CEP — debounce + ViaCEP
let cepDebounceTimer = null;
function onbHandleCepInput(input) {
  // Formata 00000-000
  let v = input.value.replace(/\D/g, '');
  if (v.length > 5) v = v.slice(0, 5) + '-' + v.slice(5, 8);
  input.value = v;
  onbState.cepRaw = v;

  // Reset estado quando edita
  if (v.length < 9) {
    onbState.cepFound = false;
    onbState.franchiseFound = false;
    onbState.stockFound = false;
    onbState.cepLoading = false;
    onbState.franchiseLoading = false;
    onbState.stockLoading = false;
    onbState.outOfCoverage = false;
    refreshOnbPipeline();
    return;
  }

  // Debounce — espera 300ms parar de digitar
  clearTimeout(cepDebounceTimer);
  cepDebounceTimer = setTimeout(() => fetchCepData(v), 300);
}

// Busca dados do CEP via ViaCEP (com fallback BrasilAPI)
async function fetchCepData(cep) {
  const cleanCep = cep.replace(/\D/g, '');
  if (cleanCep.length !== 8) return;

  onbState.cepLoading = true;
  refreshOnbPipeline();

  // 🎯 ESTRATÉGIA: 3 APIs em sequência pra garantir lat/lng SEMPRE
  // 1. AwesomeAPI — rápida, sempre tem lat/lng IBGE
  // 2. BrasilAPI v2 — fallback (às vezes tem lat/lng)
  // 3. ViaCEP — fallback final (sem lat/lng, usa bairro→coords)

  let data = null;

  // === API 1: AwesomeAPI (preferida — sempre tem lat/lng) ===
  try {
    const res = await fetch(`https://cep.awesomeapi.com.br/json/${cleanCep}`);
    if (res.ok) {
      const json = await res.json();
      if (!json.error && json.lat && json.lng) {
        data = {
          street: json.address || (json.address_type ? json.address_type + ' ' + json.address_name : ''),
          neighborhood: json.district || json.neighborhood || '',
          city: json.city || '',
          uf: json.state || '',
          lat: parseFloat(json.lat),
          lng: parseFloat(json.lng)
        };
        console.log('✅ AwesomeAPI:', data.neighborhood, data.lat, data.lng);
      }
    }
  } catch (e) { console.log('⚠️ AwesomeAPI falhou, tentando BrasilAPI'); }

  // === API 2: BrasilAPI (fallback) ===
  if (!data) {
    try {
      const res = await fetch(`https://brasilapi.com.br/api/cep/v2/${cleanCep}`);
      if (res.ok) {
        const json = await res.json();
        const coords = json.location?.coordinates;
        const hasCoords = coords && coords.latitude && coords.longitude;
        data = {
          street: json.street || '',
          neighborhood: json.neighborhood || '',
          city: json.city || '',
          uf: json.state || '',
          lat: hasCoords ? parseFloat(coords.latitude) : null,
          lng: hasCoords ? parseFloat(coords.longitude) : null
        };
        console.log('✅ BrasilAPI:', data.neighborhood, data.lat, data.lng);
      }
    } catch (e) { console.log('⚠️ BrasilAPI falhou, tentando ViaCEP'); }
  }

  // === API 3: ViaCEP (último fallback — só dados, sem coords) ===
  if (!data) {
    try {
      const res = await fetch(`https://viacep.com.br/ws/${cleanCep}/json/`);
      if (res.ok) {
        const json = await res.json();
        if (!json.erro) {
          data = {
            street: json.logradouro || '',
            neighborhood: json.bairro || '',
            city: json.localidade || '',
            uf: json.uf || '',
            lat: null,
            lng: null
          };
          console.log('✅ ViaCEP:', data.neighborhood);
        }
      }
    } catch (e) { console.log('⚠️ ViaCEP falhou'); }
  }

  if (!data || !data.city) {
    onbState.cepLoading = false;
    onbState.cepFound = false;
    toast('CEP não encontrado', 'Verifique o número e tente novamente', '⚠️');
    refreshOnbPipeline();
    return;
  }

  // === FALLBACK INTELIGENTE: se não tem lat/lng, usa coordenadas por BAIRRO ===
  if (!data.lat || !data.lng) {
    // Tenta primeiro pelo bairro+cidade (mais preciso)
    const bairroCoords = getNeighborhoodCoords(data.neighborhood, data.city, data.uf);
    if (bairroCoords) {
      data.lat = bairroCoords.lat;
      data.lng = bairroCoords.lng;
      console.log('📍 Usando coords do bairro:', data.neighborhood);
    } else {
      // Último recurso: centro da cidade
      const cityCoords = getCityCenterCoords(data.city, data.uf);
      if (cityCoords) {
        data.lat = cityCoords.lat;
        data.lng = cityCoords.lng;
        console.log('📍 Usando coords do centro da cidade:', data.city);
      }
    }
  }

  // CEP encontrado!
  onbState.street = data.street || '';
  onbState.neighborhood = data.neighborhood || '';
  onbState.city = data.city;
  onbState.uf = data.uf;
  onbState.lat = data.lat;
  onbState.lng = data.lng;
  onbState.cepLoading = false;
  onbState.cepFound = true;

  // Re-render para mostrar campos de número/complemento
  renderStage();

  // 🚀 Busca franquia mais próxima
  fetchNearestFranchise();
}

async function fetchNearestFranchise() {
  onbState.franchiseLoading = true;
  refreshOnbPipeline();

  // Latência simulada da API (~600-900ms)
  await new Promise(r => setTimeout(r, 600 + Math.random() * 300));

  // 🎯 ALGORITMO REAL: calcula distância usando Haversine
  // Em produção: GET https://api.hinode.com.br/franchises/nearest?lat=&lng=
  if (!onbState.lat || !onbState.lng) {
    // Sem coordenadas → assume cobertura ainda não disponível
    onbState.franchiseFound = false;
    onbState.franchiseLoading = false;
    onbState.outOfCoverage = true;
    refreshOnbPipeline();
    return;
  }

  // Calcula distância pra cada franquia e pega a mais próxima
  const withDistance = FRANCHISES.map(f => ({
    ...f,
    distanceKm: haversineDistance(
      { lat: onbState.lat, lng: onbState.lng },
      { lat: f.lat, lng: f.lng }
    ) / 1000
  }));

  // Ordena por distância e pega a primeira
  withDistance.sort((a, b) => a.distanceKm - b.distanceKm);
  const nearest = withDistance[0];

  // 📍 Cobertura: até 50km da franquia
  if (nearest.distanceKm > 50) {
    onbState.franchiseFound = false;
    onbState.franchiseLoading = false;
    onbState.outOfCoverage = true;
    onbState.nearestFranchiseDistance = nearest.distanceKm;
    refreshOnbPipeline();
    return;
  }

  // Atribui a franquia mais próxima com distância calculada
  STATE.nearestFranchise = nearest;
  STATE.nearestFranchise.distanceKm = nearest.distanceKm.toFixed(1);
  onbState.franchiseLoading = false;
  onbState.franchiseFound = true;
  onbState.outOfCoverage = false;
  refreshOnbPipeline();

  // Encadeia: busca o estoque
  await fetchFranchiseStock(nearest.id);
}

/* =========================================================
   🔔 SOM DE SININHO CRISTALINO (Web Audio API, sem arquivos)
   Gera um acorde Dó maior (C5 + E5 + G5) com decay exponencial
   estilo notification do iOS — leve e elegante
   ========================================================= */
let audioCtx = null;
function playChime() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const now = audioCtx.currentTime;
    const freqs = [523.25, 659.25, 783.99]; // C5, E5, G5

    freqs.forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(0.06, now + 0.005 + i * 0.015);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.7 + i * 0.1);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(now + i * 0.015);
      osc.stop(now + 0.8 + i * 0.1);
    });
  } catch (e) { /* fail silently */ }
}

/* =========================================================
   📳 HAPTIC FEEDBACK (vibração) — funciona em mobile real
   ========================================================= */
function haptic(intensity = 'light') {
  if (!navigator.vibrate) return;
  const patterns = {
    light: [8],
    medium: [18],
    heavy: [28],
    success: [8, 30, 8]
  };
  navigator.vibrate(patterns[intensity] || patterns.light);
}

   ========================================================= */
function fireConfetti(originX, originY) {
  const phoneScreen = document.querySelector('.phone-screen');
  if (!phoneScreen) return;

  const rect = phoneScreen.getBoundingClientRect();
  const localX = originX - rect.left;
  const localY = originY - rect.top;

  const colors = ['#D4AF60', '#AA8232', '#F4DCA0', '#B90032', '#FFE0D8'];
  const count = 26;
  const container = document.createElement('div');
  container.className = 'confetti-container';
  phoneScreen.appendChild(container);

  for (let i = 0; i < count; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    const color = colors[Math.floor(Math.random() * colors.length)];
    const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.4;
    const velocity = 80 + Math.random() * 120;
    const tx = Math.cos(angle) * velocity;
    const ty = Math.sin(angle) * velocity - 40;
    const rotate = (Math.random() - 0.5) * 720;
    const duration = 800 + Math.random() * 700;
    const delay = Math.random() * 80;

    piece.style.cssText = `
      left: ${localX}px;
      top: ${localY}px;
      background: ${color};
      animation: confettiFall ${duration}ms cubic-bezier(.25,.46,.45,.94) ${delay}ms forwards;
      --tx: ${tx}px;
      --ty: ${ty}px;
      --rotate: ${rotate}deg;
    `;
    if (i % 3 === 0) piece.style.borderRadius = '50%';
    else if (i % 3 === 1) {
      piece.style.width = '4px';
      piece.style.height = '10px';
    }
    container.appendChild(piece);
  }
  setTimeout(() => container.remove(), 1800);
}

/* =========================================================
   🛫 ANIMAÇÃO DE VOO (produto → carrinho)
   Cria uma esfera dourada que voa em parábola até o ícone do carrinho
   ========================================================= */
function flyToCart(originEl, productEmoji) {
  if (!originEl) return;
  const phoneScreen = document.querySelector('.phone-screen');
  const cartIcon = document.querySelector('.nav-cart-ico');
  if (!phoneScreen || !cartIcon) return;

  const screenRect = phoneScreen.getBoundingClientRect();
  const fromRect = originEl.getBoundingClientRect();
  const toRect = cartIcon.getBoundingClientRect();

  const fromX = fromRect.left - screenRect.left + fromRect.width / 2;
  const fromY = fromRect.top - screenRect.top + fromRect.height / 2;
  const toX = toRect.left - screenRect.left + toRect.width / 2;
  const toY = toRect.top - screenRect.top + toRect.height / 2;

  // Cria o "projétil" voando
  const flyer = document.createElement('div');
  flyer.className = 'fly-projectile';
  flyer.textContent = productEmoji || '✨';
  flyer.style.left = fromX + 'px';
  flyer.style.top = fromY + 'px';
  phoneScreen.appendChild(flyer);

  // Calcula deltas
  const dx = toX - fromX;
  const dy = toY - fromY;

  // Usa Web Animation API para parábola perfeita
  flyer.animate([
    {
      transform: 'translate(-50%, -50%) scale(1) rotate(0deg)',
      opacity: 1
    },
    {
      // Ponto médio: sobe alto (parábola) — controle vertical
      transform: `translate(calc(-50% + ${dx * 0.5}px), calc(-50% + ${dy * 0.3 - 80}px)) scale(1.4) rotate(180deg)`,
      opacity: 1,
      offset: 0.5
    },
    {
      transform: `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px)) scale(0.3) rotate(360deg)`,
      opacity: 0
    }
  ], {
    duration: 700,
    easing: 'cubic-bezier(0.5, 0, 0.75, 0.5)',
    fill: 'forwards'
  });

  // Faz o ícone do carrinho "pulsar" quando o projétil chega
  setTimeout(() => {
    cartIcon.classList.remove('cart-receive');
    void cartIcon.offsetWidth;
    cartIcon.classList.add('cart-receive');
    setTimeout(() => cartIcon.classList.remove('cart-receive'), 400);
  }, 650);

  // Remove o projétil
  setTimeout(() => flyer.remove(), 750);
}

function addToCart(id, goToCart = false) {
  const p = PRODUCTS.find(x => x.id === id);
  const existing = STATE.cart.find(i => i.id === id);
  const wasEmpty = STATE.cart.length === 0; // pra confete
  if (existing) existing.qty++;
  else STATE.cart.push({ id: p.id, name: p.name, emoji: p.emoji, bg: p.bg, image: p.image || null, qty: 1, price: p.price, cat: p.cat });

  if (goToCart) {
    goClient('cart');
    return;
  }

  // ✨ Efeitos de feedback (sem re-renderizar)
  // 1. Som cristalino
  playChime();
  // 2. Vibração leve (mobile)
  haptic('success');
  // 3. Voo do produto até o carrinho
  const cardEl = document.querySelector(`.product-card[data-product-id="${id}"] .product-img`);
  if (cardEl) flyToCart(cardEl, p.emoji);
  // 4. Confete se for o primeiro item

  }, 700);
}

/* =========================================================
   🔄 PULL-TO-REFRESH (sol nascendo conforme puxa)
   ========================================================= */
let pullRefreshActive = false;
function setupPullToRefresh() {
  const content = document.querySelector('.app-content');
  if (!content) return;

  let startY = 0;
  let pulling = false;
  let pullDistance = 0;
  const threshold = 70;
  const maxPull = 120;

  // Cria o indicador de pull (sol mini)
  let indicator = content.querySelector('.pull-indicator');
  if (!indicator) {
    indicator = document.createElement('div');
    indicator.className = 'pull-indicator';
    indicator.innerHTML = `
      <svg viewBox="0 0 60 60" class="pull-sun">
        <defs>
          <radialGradient id="pull-sun-grad" cx="50%" cy="50%" r="50%">
            <stop offset="0" stop-color="#FFFFFF"/>
            <stop offset="0.4" stop-color="#F4DCA0"/>
            <stop offset="1" stop-color="#AA8232"/>
          </radialGradient>
        </defs>
        <g class="pull-sun-rays" transform-origin="30 30">
          <line x1="30" y1="6" x2="30" y2="14" stroke="#D4AF60" stroke-width="2" stroke-linecap="round"/>
          <line x1="49" y1="11" x2="44" y2="16" stroke="#D4AF60" stroke-width="2" stroke-linecap="round"/>
          <line x1="54" y1="30" x2="46" y2="30" stroke="#D4AF60" stroke-width="2" stroke-linecap="round"/>
          <line x1="49" y1="49" x2="44" y2="44" stroke="#D4AF60" stroke-width="2" stroke-linecap="round"/>
          <line x1="30" y1="54" x2="30" y2="46" stroke="#D4AF60" stroke-width="2" stroke-linecap="round"/>
          <line x1="11" y1="49" x2="16" y2="44" stroke="#D4AF60" stroke-width="2" stroke-linecap="round"/>
          <line x1="6" y1="30" x2="14" y2="30" stroke="#D4AF60" stroke-width="2" stroke-linecap="round"/>
          <line x1="11" y1="11" x2="16" y2="16" stroke="#D4AF60" stroke-width="2" stroke-linecap="round"/>
        </g>
        <circle cx="30" cy="30" r="14" fill="url(#pull-sun-grad)"/>
      </svg>
      <div class="pull-text">Solte para atualizar</div>
    `;
    content.insertBefore(indicator, content.firstChild);
  }

  const onTouchStart = (e) => {
    if (content.scrollTop > 5) return;
    startY = e.touches[0].clientY;
    pulling = true;
  };

  const onTouchMove = (e) => {
    if (!pulling) return;
    const currentY = e.touches[0].clientY;
    pullDistance = Math.max(0, currentY - startY);
    if (pullDistance > 0 && content.scrollTop <= 5) {
      e.preventDefault();
      const eased = Math.min(maxPull, pullDistance * 0.5);
      indicator.style.transform = `translateY(${eased}px) rotate(${eased * 4}deg)`;
      indicator.style.opacity = Math.min(1, eased / threshold);

      if (eased >= threshold) {
        indicator.classList.add('ready');
      } else {
        indicator.classList.remove('ready');
      }
    }
  };

  const onTouchEnd = () => {
    if (!pulling) return;
    pulling = false;
    const eased = Math.min(maxPull, pullDistance * 0.5);
    if (eased >= threshold && !pullRefreshActive) {
      pullRefreshActive = true;
      indicator.classList.add('refreshing');
      indicator.style.transform = `translateY(50px) rotate(0deg)`;
      haptic('medium');
      // Simula refresh
      setTimeout(() => {
        indicator.classList.remove('refreshing', 'ready');
        indicator.style.transform = '';
        indicator.style.opacity = '';
        pullRefreshActive = false;
        pullDistance = 0;
        toast('Atualizado ✨', 'Catálogo sincronizado com a franquia', '🌅');
      }, 1500);
    } else {
      indicator.style.transform = '';
      indicator.style.opacity = '';
      indicator.classList.remove('ready');
      pullDistance = 0;
    }
  };

  content.addEventListener('touchstart', onTouchStart, { passive: true });
  content.addEventListener('touchmove', onTouchMove, { passive: false });
  content.addEventListener('touchend', onTouchEnd);
}

/* Simula o fluxo real:
   • received (cliente acabou de pagar, Hinode processando)
   • payment_confirmed (Hinode aprovou e mandou pra franquia)
   • preparing (franquia separando)
   • in_delivery (motoboy a caminho)
   • delivered (entregue)
*/
function scheduleOrderAutoProgress(orderId) {
  // 1. +2.5s: Hinode confirma pagamento → manda pra franquia
  setTimeout(() => {
    const o = STATE.orders.find(x => x.id === orderId);
    if (!o || o.status !== 'received') return;
    o.status = 'payment_confirmed';
    o.paymentStatus = 'paid';
    toast('✓ Pagamento aprovado pela Hinode', 'Pedido enviado à ' + (o.franchiseName || 'franquia'), '💳');
    if (STATE.view === 'client' && STATE.clientScreen === 'tracking' && STATE.activeOrderId === orderId) {
      renderStage();
    }
  }, 2500);

  // 2. +5s: Franquia recebe e começa a preparar
  setTimeout(() => {
    const o = STATE.orders.find(x => x.id === orderId);
    if (!o || o.status !== 'payment_confirmed') return;
    o.status = 'preparing';
    toast('🌹 Franquia separando', `${o.franchiseName || 'A franquia'} está preparando seu pedido`, '✨');
    if (STATE.view === 'client' && STATE.clientScreen === 'tracking' && STATE.activeOrderId === orderId) {
      renderStage();
    }
  }, 5000);

  // 3. +10s: Pronto! Despacha motoboy
  setTimeout(() => {
    const o = STATE.orders.find(x => x.id === orderId);
    if (!o || o.status !== 'preparing') return;
    o.status = 'in_delivery';
    o.courier = { name: 'Lucas Ferreira', vehicle: 'Honda CG • CHV-2384', rating: 4.9 };
    UberSim.start(orderId);
    toast('🛵 Motoboy a caminho!', 'Acompanhe a localização ao vivo no mapa', '📡');
    if (STATE.view === 'client' && STATE.clientScreen === 'tracking' && STATE.activeOrderId === orderId) {
      renderStage();
    }
  }, 10000);
}

// Calcula distância em metros entre 2 pontos lat/lng (Haversine)
function haversineDistance(coord1, coord2) {
  const R = 6371000; // raio da terra em metros
  const toRad = (deg) => deg * Math.PI / 180;
  const dLat = toRad(coord2.lat - coord1.lat);
  const dLng = toRad(coord2.lng - coord1.lng);
  const a = Math.sin(dLat/2) ** 2 +
            Math.cos(toRad(coord1.lat)) * Math.cos(toRad(coord2.lat)) *
            Math.sin(dLng/2) ** 2;
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c;
}

// Formata distância (m ou km)
function fmtDistance(meters) {
  if (meters < 1000) return Math.round(meters) + ' m';
  return (meters / 1000).toFixed(1) + ' km';
}

// Formata tempo desde último update
function fmtSecondsAgo(timestamp) {
  if (!timestamp) return '—';
  const sec = Math.floor((Date.now() - timestamp) / 1000);
  if (sec < 1) return 'agora';
  if (sec < 60) return `há ${sec}s`;
  return `há ${Math.floor(sec/60)} min`;
}

/* =========================================================
   UBER DIRECT SIMULATOR
   Simula fielmente os webhooks da Uber Direct API:
   - event.delivery_status (mudanças de fase)
   - event.courier_update (lat/lng a cada 20s, mas em modo demo
     usamos um intervalo menor para não demorar)
   ========================================================= */

// Coordenadas reais aproximadas (Jardins, São Paulo)
const PICKUP_COORDS = { lat: -23.5615, lng: -46.6720 };  // Hinode Jardins
const DROPOFF_COORDS = { lat: -23.5505, lng: -46.6555 }; // Cliente

// Pontos da rota (gerados como bezier curve simulando ruas)
function generateRoutePoints(start, end, count = 20) {
  const points = [];
  // Adiciona "ruído" para simular ruas reais
  for (let i = 0; i <= count; i++) {
    const t = i / count;
    // Curva de Bezier com control point que dá um caminho mais "urbano"
    const cp1 = {
      lat: start.lat + (end.lat - start.lat) * 0.3 + 0.0008,
      lng: start.lng + (end.lng - start.lng) * 0.5 - 0.0010
    };
    const cp2 = {
      lat: start.lat + (end.lat - start.lat) * 0.7 - 0.0005,
      lng: start.lng + (end.lng - start.lng) * 0.6 + 0.0008
    };
    // Bezier cúbica
    const lat = Math.pow(1-t, 3) * start.lat
              + 3 * Math.pow(1-t, 2) * t * cp1.lat
              + 3 * (1-t) * Math.pow(t, 2) * cp2.lat
              + Math.pow(t, 3) * end.lat;
    const lng = Math.pow(1-t, 3) * start.lng
              + 3 * Math.pow(1-t, 2) * t * cp1.lng
              + 3 * (1-t) * Math.pow(t, 2) * cp2.lng
              + Math.pow(t, 3) * end.lng;
    points.push({ lat, lng, t });
  }
  return points;
}

const ROUTE = generateRoutePoints(PICKUP_COORDS, DROPOFF_COORDS, 18);

const UberSim = {
  state: {
    deliveryId: null,
    status: 'idle', // idle, pending, pickup, dropoff, delivered
    routeProgress: 0, // 0..1
    coords: { ...PICKUP_COORDS },
    coordsTarget: { ...PICKUP_COORDS },
    webhooks: [], // log dos webhooks
    speedMultiplier: 1, // 1x, 2x, 5x
    timer: null,
    smoothTimer: null,
    pointIndex: 0
  },

  // Inicia simulação quando pedido é despachado
  start(orderId) {
    this.stop(); // limpar simulação anterior
    const s = this.state;
    s.deliveryId = `del_${orderId.replace('HND-', '')}_${Date.now().toString(36)}`;
    s.status = 'pending';
    s.routeProgress = 0;
    s.coords = { ...PICKUP_COORDS };
    s.coordsTarget = { ...PICKUP_COORDS };
    s.webhooks = [];
    s.pointIndex = 0;

    // Webhook 1: delivery_status pending → pickup
    this.emitStatusWebhook('pickup', orderId);

    // Inicia o ciclo de courier_update (a cada ~3 segundos no modo demo)
    s.timer = setInterval(() => this.tick(orderId), 3000 / s.speedMultiplier);

    // Inicia interpolação suave (60fps)
    this.startSmoothing();
  },

  startSmoothing() {
    const s = this.state;
    if (s.smoothTimer) clearInterval(s.smoothTimer);
    s.smoothTimer = setInterval(() => {
      // Lerp da posição atual em direção ao alvo
      const lerpFactor = 0.04;
      s.coords.lat += (s.coordsTarget.lat - s.coords.lat) * lerpFactor;
      s.coords.lng += (s.coordsTarget.lng - s.coords.lng) * lerpFactor;
      this.updateMapVisuals();
    }, 33); // ~30fps
  },

  tick(orderId) {
    const s = this.state;
    s.pointIndex++;

    if (s.pointIndex >= ROUTE.length) {
      // Chegou ao destino
      this.emitStatusWebhook('delivered', orderId);
      this.stop();
      // Atualizar order
      const order = STATE.orders.find(o => o.id === orderId);
      if (order) {
        order.status = 'delivered';
      }
      // Se o cliente está vendo o tracking, vai pra delivered
      if (STATE.view === 'client' && STATE.activeOrderId === orderId) {
        toast('Entregue! 🎉', 'Aproveite seus produtos Hinode', '✓');
        setTimeout(() => goClient('delivered'), 800);
      }
      return;
    }

    const point = ROUTE[s.pointIndex];
    s.coordsTarget = { lat: point.lat, lng: point.lng };
    s.routeProgress = point.t;

    // Quando chega na franquia (primeiros pontos), muda pra dropoff
    if (s.pointIndex === 1 && s.status === 'pickup') {
      s.status = 'dropoff';
      this.emitStatusWebhook('dropoff', orderId);
    }

    // Emitir courier_update webhook
    this.emitCourierUpdateWebhook(orderId, point);

    // Re-render se estiver vendo tracking
    if (STATE.view === 'client' && STATE.clientScreen === 'tracking') {
      // Apenas atualizar painel uber + mapa, não re-renderizar app inteiro
      updateUberPanel();
      updateTrackingMap();
    }
  },

  emitStatusWebhook(newStatus, orderId) {
    const s = this.state;
    s.status = newStatus;

    const payload = {
      kind: 'event.delivery_status',
      created: new Date().toISOString(),
      status: newStatus,
      delivery_id: s.deliveryId,
      data: {
        id: s.deliveryId,
        external_id: orderId,
        status: newStatus,
        pickup: { address: 'R. Oscar Freire, 1242 - Jardins, São Paulo - SP' },
        dropoff: { address: 'R. Augusta, 2356 - Apto 89, Consolação' },
        courier: newStatus === 'pickup' || newStatus === 'dropoff' ? {
          name: 'Lucas F.',
          rating: '4.90',
          vehicle_type: 'motorcycle',
          vehicle_make: 'Honda',
          vehicle_model: 'CG 160',
          vehicle_color: 'red',
          vehicle_license_plate: '**2384',
          phone_number: '+55*****8745',
          public_phone_info: {
            formatted_phone_number: '+551140049999,4823',
            phone_number: '+551140049999',
            pin_code: '4823'
          }
        } : null
      }
    };

    s.webhooks.unshift({
      type: 'delivery_status',
      time: new Date().toLocaleTimeString('pt-BR'),
      timestamp: Date.now(),
      payload
    });

    if (s.webhooks.length > 12) s.webhooks.pop();
    updateUberPanel();
  },

  emitCourierUpdateWebhook(orderId, point) {
    const s = this.state;
    const payload = {
      kind: 'event.courier_update',
      created: new Date().toISOString(),
      delivery_id: s.deliveryId,
      data: {
        id: s.deliveryId,
        external_id: orderId,
        status: s.status,
        courier_imminent: s.routeProgress > 0.85,
        courier: {
          name: 'Lucas F.',
          location: {
            lat: parseFloat(point.lat.toFixed(6)),
            lng: parseFloat(point.lng.toFixed(6))
          },
          phone_number: '+55*****8745',
          rating: '4.90',
          vehicle_color: 'red',
          vehicle_make: 'Honda',
          vehicle_model: 'CG 160',
          vehicle_type: 'motorcycle',
          vehicle_license_plate: '**2384'
        }
      }
    };

    s.webhooks.unshift({
      type: 'courier_update',
      time: new Date().toLocaleTimeString('pt-BR'),
      timestamp: Date.now(),
      payload
    });

    if (s.webhooks.length > 12) s.webhooks.pop();
  },

  updateMapVisuals() {
    const moto = document.getElementById('moto-marker');
    const s = this.state;

    // Mover marker do motoboy
    if (moto) {
      const svgX = latLngToSvgX(s.coords.lng);
      const svgY = latLngToSvgY(s.coords.lat);
      moto.setAttribute('transform', `translate(${svgX}, ${svgY})`);
    }

    // Atualizar info toast (lat/lng) no topo do mapa
    const toastEl = document.getElementById('map-coords-toast');
    if (toastEl) {
      toastEl.textContent = `📡 lat ${s.coords.lat.toFixed(5)}, lng ${s.coords.lng.toFixed(5)}`;
    }

    // Atualizar card de live location em tempo real (lat/lng grandes)
    const latEl = document.getElementById('live-loc-lat');
    if (latEl) latEl.textContent = s.coords.lat.toFixed(6);
    const lngEl = document.getElementById('live-loc-lng');
    if (lngEl) lngEl.textContent = s.coords.lng.toFixed(6);

    // Distância em tempo real (haversine)
    const distanceEl = document.getElementById('live-loc-distance');
    if (distanceEl) {
      const remainingDistance = haversineDistance(s.coords, DROPOFF_COORDS);
      const formatted = fmtDistance(remainingDistance);
      const parts = formatted.split(' ');
      distanceEl.innerHTML = parts[0] + '<small>' + (parts[1] || '') + '</small>';
    }
  },

  setSpeed(mult) {
    const s = this.state;
    s.speedMultiplier = mult;
    if (s.timer) {
      clearInterval(s.timer);
      const order = STATE.orders.find(o => o.id === STATE.activeOrderId);
      if (order) {
        s.timer = setInterval(() => this.tick(order.id), 3000 / s.speedMultiplier);
      }
    }
    updateUberPanel();
  },

  stop() {
    const s = this.state;
    if (s.timer) clearInterval(s.timer);
    if (s.smoothTimer) clearInterval(s.smoothTimer);
    s.timer = null;
    s.smoothTimer = null;
  },

  reset() {
    this.stop();
    this.state.webhooks = [];
    this.state.status = 'idle';
    this.state.routeProgress = 0;
    this.state.coords = { ...PICKUP_COORDS };
    this.state.coordsTarget = { ...PICKUP_COORDS };
    this.state.pointIndex = 0;
    updateUberPanel();
  }
};

// Mapeamento lat/lng → coordenadas SVG
// Bounding box aproximado (delta latlng → svg 0..400 / 0..380)
const SVG_BOUNDS = {
  minLat: -23.5640, maxLat: -23.5485,
  minLng: -46.6735, maxLng: -46.6540
};
function latLngToSvgX(lng) {
  const t = (lng - SVG_BOUNDS.minLng) / (SVG_BOUNDS.maxLng - SVG_BOUNDS.minLng);
  return 50 + t * 300; // padding lateral
}
function latLngToSvgY(lat) {
  const t = (SVG_BOUNDS.maxLat - lat) / (SVG_BOUNDS.maxLat - SVG_BOUNDS.minLat);
  return 80 + t * 220;
}

function renderMap(status) {
  const sim = UberSim.state;
  const motoX = latLngToSvgX(sim.coords.lng);
  const motoY = latLngToSvgY(sim.coords.lat);
  const showMoto = status === 'in_delivery';

  // Pontos da rota em SVG
  const routeSvgPath = ROUTE.map((p, i) => {
    const x = latLngToSvgX(p.lng);
    const y = latLngToSvgY(p.lat);
    return (i === 0 ? 'M' : 'L') + ' ' + x + ' ' + y;
  }).join(' ');

  return `
    <svg class="map-svg" viewBox="0 0 400 380" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="streets" patternUnits="userSpaceOnUse" width="60" height="60">
          <rect width="60" height="60" fill="#DDE5EA"/>
          <path d="M0 30 L60 30 M30 0 L30 60" stroke="#FFF" stroke-width="3"/>
          <path d="M0 30 L60 30 M30 0 L30 60" stroke="#C8D5DD" stroke-width="0.5"/>
        </pattern>
        <linearGradient id="route-grad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0" stop-color="#370014"/>
          <stop offset="1" stop-color="#AA8232"/>
        </linearGradient>
        <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
          <feOffset dx="0" dy="2"/>
          <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
          <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <rect width="400" height="380" fill="url(#streets)"/>

      <!-- Avenidas principais -->
      <rect x="0" y="170" width="400" height="14" fill="#F4F0EA" opacity="0.95"/>
      <rect x="190" y="0" width="14" height="380" fill="#F4F0EA" opacity="0.95"/>

      <!-- Parques/blocos verdes -->
      <rect x="40" y="60" width="60" height="50" rx="6" fill="#B5D4C2" opacity="0.6"/>
      <rect x="280" y="220" width="80" height="60" rx="6" fill="#B5D4C2" opacity="0.6"/>
      <circle cx="320" cy="80" r="20" fill="#B5D4C2" opacity="0.6"/>

      <!-- Rota completa (tracejada) -->
      <path d="${routeSvgPath}"
            fill="none"
            stroke="url(#route-grad)"
            stroke-width="4"
            stroke-linecap="round"
            stroke-dasharray="8,6"
            opacity="0.7"/>

      <!-- Trail percorrido (sólido) -->
      ${showMoto && sim.pointIndex > 0 ? `
        <path d="${ROUTE.slice(0, sim.pointIndex + 1).map((p, i) => {
          const x = latLngToSvgX(p.lng);
          const y = latLngToSvgY(p.lat);
          return (i === 0 ? 'M' : 'L') + ' ' + x + ' ' + y;
        }).join(' ')}"
              fill="none"
              stroke="#AA8232"
              stroke-width="5"
              stroke-linecap="round"
              opacity="0.95"/>
      ` : ''}

      <!-- Pin franquia -->
      <g transform="translate(${latLngToSvgX(PICKUP_COORDS.lng)}, ${latLngToSvgY(PICKUP_COORDS.lat)})" filter="url(#shadow)">
        <circle r="18" fill="#370014"/>
        <circle r="14" fill="#B90032"/>
        <text y="5" text-anchor="middle" font-size="14" font-family="serif" font-weight="bold" fill="#D4AF60">H</text>
      </g>
      <text x="${latLngToSvgX(PICKUP_COORDS.lng)}" y="${latLngToSvgY(PICKUP_COORDS.lat) + 35}" text-anchor="middle" font-size="9" font-weight="700" fill="#370014" font-family="Manrope">FRANQUIA</text>

      <!-- Pin destino -->
      <g transform="translate(${latLngToSvgX(DROPOFF_COORDS.lng)}, ${latLngToSvgY(DROPOFF_COORDS.lat)})" filter="url(#shadow)">
        <circle r="16" fill="#AA8232"/>
        <circle r="12" fill="#D4AF60"/>
        <text y="4" text-anchor="middle" font-size="14">📍</text>
      </g>
      <text x="${latLngToSvgX(DROPOFF_COORDS.lng)}" y="${latLngToSvgY(DROPOFF_COORDS.lat) + 35}" text-anchor="middle" font-size="9" font-weight="700" fill="#370014" font-family="Manrope">VOCÊ</text>

      <!-- Motoboy (posição interpolada) -->
      ${showMoto ? `
        <g id="moto-marker" transform="translate(${motoX}, ${motoY})">
          <circle r="22" fill="#AA8232" opacity="0.3">
            <animate attributeName="r" values="18;28;18" dur="2s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0.4;0;0.4" dur="2s" repeatCount="indefinite"/>
          </circle>
          <circle r="14" fill="#FFF" stroke="#370014" stroke-width="2"/>
          <text y="5" text-anchor="middle" font-size="16">🛵</text>
        </g>
      ` : ''}
    </svg>
  `;
}

function advanceOrderForDemo(orderId) {
  const order = STATE.orders.find(o => o.id === orderId);
  if (!order) return;
  const idx = STEPS.indexOf(order.status);
  if (idx < STEPS.length - 1) {
    order.status = STEPS[idx + 1];
    if (order.status === 'in_delivery') {
      toast('A caminho!', `${order.number} saiu para entrega`, '🛵');

    if (order.status === 'delivered') {

}
