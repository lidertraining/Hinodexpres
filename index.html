function renderOrderActions(o) {
  if (o.status === 'received' || o.status === 'payment_confirmed') {
    return `
      <button class="btn-outline" onclick="closeOrderModal()">Voltar</button>
      <button class="btn-primary" onclick="advanceOrder('${o.id}')">Iniciar separação dos produtos</button>
    `;
  }
  if (o.status === 'preparing') {
    const allChecked = o.checked.length === o.items.length;
    return `
      <button class="btn-outline" onclick="closeOrderModal()">Voltar</button>
      <button class="btn-primary" ${!allChecked ? 'style="opacity:0.5;cursor:not-allowed"' : ''} onclick="${allChecked ? `advanceOrder('${o.id}')` : `toast('Aguarde','Marque todos os itens como separados','📦')`}">
        ${allChecked ? 'Pronto para coleta →' : `Itens separados (${o.checked.length}/${o.items.length})`}
      </button>
    `;
  }
  if (o.status === 'ready') {
    return `
      <button class="btn-outline" onclick="closeOrderModal()">Voltar</button>
      <button class="btn-gold btn-primary" onclick="dispatchOrder('${o.id}')">
        🛵 Despachar via Uber Direct
      </button>
    `;
  }
  if (o.status === 'in_delivery') {
    return `
      <button class="btn-outline" onclick="closeOrderModal()">Fechar</button>
      <button class="btn-primary" onclick="advanceOrder('${o.id}')">Marcar como entregue</button>
    `;
  }
  return `<button class="btn-outline btn-block" onclick="closeOrderModal()">Fechar</button>`;
}

function toggleCheck(orderId, idx) {
  const o = STATE.orders.find(x => x.id === orderId);
  if (!o) return;
  if (o.checked.includes(idx)) o.checked = o.checked.filter(i => i !== idx);
  else o.checked.push(idx);
  renderStage();
}

function advanceOrder(orderId) {
  const o = STATE.orders.find(x => x.id === orderId);
  if (!o) return;
  if (o.status === 'received' || o.status === 'payment_confirmed') {
    o.status = 'preparing';
    toast('Iniciada separação', `${o.number} sendo preparado`, '📦');
  } else if (o.status === 'preparing') {
    o.status = 'ready';
    toast('Pronto para coleta', `Acione o entregador para ${o.number}`, '✓');
  } else if (o.status === 'in_delivery') {
    o.status = 'delivered';
    toast('Entregue!', `${o.number} concluído`, '🎉');
  }
  renderStage();
}

function dispatchOrder(orderId) {
  const o = STATE.orders.find(x => x.id === orderId);
  if (!o) return;
  closeOrderModal();
  // Simula chamada à API Uber Direct: POST /deliveries
  toast('📡 Chamando Uber Direct...', `POST /deliveries enviado • aguardando entregador`, '🌐');

  // Em produção: a API responde imediatamente com delivery_id e status "pending"
  // Em segundos chega o primeiro webhook event.delivery_status = "pickup" com courier atribuído
  setTimeout(() => {
    const order = STATE.orders.find(x => x.id === orderId);
    if (!order) return;
    order.status = 'in_delivery';
    order.courier = { name: 'Lucas Ferreira', vehicle: 'Honda CG • CHV-2384', rating: 4.9 };
    STATE.activeOrderId = orderId;
    UberSim.start(orderId);
    toast('🛵 Entregador encontrado!', `Lucas F. (Uber Driver) está a caminho da franquia`, '✓');
    renderStage();
  }, 1500);
}

// Atualiza apenas o SVG do mapa + card de live location, sem re-renderizar a tela inteira
function updateTrackingMap() {
  const order = STATE.orders.find(o => o.id === STATE.activeOrderId);
  if (!order) return;

  // 1. Atualizar mapa SVG
  const mapContainer = document.querySelector('.map-container');
  if (mapContainer) {
    const oldSvg = mapContainer.querySelector('.map-svg');
    if (oldSvg) {
      const tempDiv = document.createElement('div');
      tempDiv.innerHTML = renderMap(order.status);
      const newSvg = tempDiv.querySelector('.map-svg');
      if (newSvg) oldSvg.replaceWith(newSvg);
    }
  }

  // 2. Atualizar ETA dinâmico
  const sim = UberSim.state;
  const etaEl = document.querySelector('.tracking-eta-value em');
  if (etaEl && order.status === 'in_delivery') {
    const minsLeft = Math.max(1, Math.ceil((1 - sim.routeProgress) * 18));
    etaEl.textContent = minsLeft + ' min';
  }

  // 3. Atualizar coords no toast do mapa
  const toastEl = document.getElementById('map-coords-toast');
  if (toastEl) {
    toastEl.textContent = `📡 lat ${sim.coords.lat.toFixed(5)}, lng ${sim.coords.lng.toFixed(5)}`;
  }

  // 4. Atualizar card de localização ao vivo
  const latEl = document.getElementById('live-loc-lat');
  if (latEl) latEl.textContent = sim.coords.lat.toFixed(6);

  const lngEl = document.getElementById('live-loc-lng');
  if (lngEl) lngEl.textContent = sim.coords.lng.toFixed(6);

  const distanceEl = document.getElementById('live-loc-distance');
  if (distanceEl) {
    const remainingDistance = haversineDistance(sim.coords, DROPOFF_COORDS);
    const formatted = fmtDistance(remainingDistance);
    const parts = formatted.split(' ');
    distanceEl.innerHTML = parts[0] + '<small>' + (parts[1] || '') + '</small>';
  }

  const progressEl = document.getElementById('live-loc-progress');
  if (progressEl) {
    progressEl.innerHTML = Math.round(sim.routeProgress * 100) + '<small>%</small>';
  }

  const barEl = document.getElementById('live-loc-bar');
  if (barEl) barEl.style.width = (sim.routeProgress * 100) + '%';

  const updateEl = document.getElementById('live-loc-update');
  if (updateEl) updateEl.textContent = fmtSecondsAgo(sim.webhooks[0]?.timestamp);

  const statusEl = document.getElementById('live-loc-status');
  const isArriving = sim.routeProgress > 0.85;
  if (statusEl) {
    statusEl.innerHTML = isArriving
      ? '<span class="arriving">⚡ Chegando!</span>'
      : 'Atualização contínua';
  }

  // 5. Habilitar botão "confirmar recebimento" quando estiver chegando
  const confirmBtn = document.getElementById('btn-confirm-receipt');
  if (confirmBtn) {
    if (isArriving) {
      confirmBtn.disabled = false;
      confirmBtn.querySelector('span:last-child').textContent = 'Confirmar recebimento';
    } else {
      confirmBtn.disabled = true;
      confirmBtn.querySelector('span:last-child').textContent = 'Aguardando entregador chegar...';
    }
  }
}

// 💧 Ripple effect global em qualquer botão
(function setupRipple() {
  document.addEventListener('pointerdown', (e) => {
    const target = e.target.closest('button, .product-card, [role="button"], .btn-primary, .btn-cta, .btn-gold, .category-pill, .filter-pill');
    if (!target) return;
    if (target.classList.contains('no-ripple')) return;

    // Garante container relativo
    const rect = target.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    // Cria ripple
    const ripple = document.createElement('span');
    ripple.className = 'ripple';
    ripple.style.left = x + 'px';
    ripple.style.top = y + 'px';
    const size = Math.max(rect.width, rect.height);
    ripple.style.width = ripple.style.height = size + 'px';

    // Garante posição relativa no target
    const computedPosition = getComputedStyle(target).position;
    if (computedPosition === 'static') {
      target.style.position = 'relative';
    }
    target.style.overflow = 'hidden';
    target.appendChild(ripple);

    setTimeout(() => ripple.remove(), 650);
  }, { passive: true });
})();

// 🌫️ Partículas de aroma no produto detalhe
function spawnAromaParticles(container) {
  if (!container) return;
  const aromaWrapper = container.querySelector('.aroma-container') || (() => {
    const w = document.createElement('div');
    w.className = 'aroma-container';
    container.appendChild(w);
    return w;
  })();

  const count = 5;
  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      const p = document.createElement('div');
      p.className = 'aroma-particle';
      p.style.left = (40 + Math.random() * 20) + '%';
      p.style.bottom = '20%';
      p.style.setProperty('--drift', ((Math.random() - 0.5) * 80) + 'px');
      p.style.animationDelay = (Math.random() * 0.5) + 's';
      aromaWrapper.appendChild(p);
      setTimeout(() => p.remove(), 4500);
    }, i * 300);
  }
}

// Hook automático: quando entra na ficha do produto, dispara aroma
(function autoSpawnAroma() {
  let lastSpawn = 0;
  const observer = new MutationObserver(() => {
    const now = Date.now();
    if (now - lastSpawn < 2000) return; // throttle
    const productImage = document.querySelector('.product-detail-image, .detail-product-image, .detail-image-wrapper');
    if (productImage) {
      lastSpawn = now;
      spawnAromaParticles(productImage);
      // E novamente a cada 6s pra manter o ambiente vivo
      const interval = setInterval(() => {
        if (!document.body.contains(productImage)) {
          clearInterval(interval);
          return;
        }
        spawnAromaParticles(productImage);
      }, 6000);
    }
  });
  observer.observe(document.body, { childList: true, subtree: true });
})();

// 📳 Haptic em todos os cliques de botões importantes
(function ampliFyHaptics() {
  document.addEventListener('pointerdown', (e) => {
    const target = e.target.closest('button, [role="button"], .product-card, .category-pill, .filter-pill, .nav-btn');
    if (!target) return;
    if (target.classList.contains('no-haptic')) return;

    // Usa intensidade baseada no tipo
    if (target.matches('.btn-cta, .btn-gold, .btn-primary, [class*="checkout"]')) {
      haptic('medium');
    } else if (target.matches('.product-card, .category-pill')) {
      haptic('light');
    } else {
      haptic('light');
    }
  }, { passive: true });
})();

// ✨ Sparkle burst em ações especiais (ex: favoritar)
function fireSparkles(x, y) {
  const burst = document.createElement('div');
  burst.className = 'sparkle-burst';
  burst.style.left = (x - 50) + 'px';
  burst.style.top = (y - 50) + 'px';
  burst.style.position = 'fixed';
  burst.style.zIndex = '9999';

  for (let i = 0; i < 8; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.style.left = '50%';
    s.style.top = '50%';
    const angle = (i / 8) * Math.PI * 2;
    const dist = 30 + Math.random() * 20;
    const dist2 = dist * 1.5;
    s.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
    s.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
    s.style.setProperty('--tx2', Math.cos(angle) * dist2 + 'px');
    s.style.setProperty('--ty2', Math.sin(angle) * dist2 + 'px');
    s.style.animationDelay = (i * 0.02) + 's';
    burst.appendChild(s);
  }
  document.body.appendChild(burst);
  setTimeout(() => burst.remove(), 900);
}
window.fireSparkles = fireSparkles;

// 🛍️ Detecta mudanças no carrinho e anima ícone (uma vez só)
(function watchCart() {
  let lastCartCount = 0;
  let initialized = false;
  setInterval(() => {
    const cartCount = (typeof STATE !== 'undefined' && STATE.cart)
      ? STATE.cart.reduce((s, i) => s + i.qty, 0) : 0;
    // Pula a primeira leitura (estado inicial) pra não disparar no carregamento
    if (!initialized) {
      initialized = true;
      lastCartCount = cartCount;
      return;
    }
    // Só anima quando aumenta DE VERDADE (nova adição)
    if (cartCount > lastCartCount) {
      const icons = document.querySelectorAll('.cart-icon-wrapper');
      icons.forEach(icon => {
        if (icon.classList.contains('has-items')) return; // já está animando
        icon.classList.add('has-items');
        setTimeout(() => icon.classList.remove('has-items'), 800);
      });
    }
    lastCartCount = cartCount;
  }, 500);
})();
